<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us Clone - Ultimate Calibrator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        /* Fixiertes Control-Panel unabhängig von der Kamera */
        #calibrator-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            border: 1px solid #00ffcc;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            max-width: 290px;
        }
        .panel-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .control-group {
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
        }
        .control-group span {
            min-width: 95px;
            display: inline-block;
            font-weight: bold;
        }
        .btn-wrapper {
            display: flex;
            gap: 2px;
        }
        button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 4px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            min-width: 32px;
        }
        button:active {
            background: #00ffcc;
            color: #000;
        }
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 10;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 80px;
            height: 80px;
            background: rgba(180, 180, 180, 0.4);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="calibrator-panel">
        <div class="panel-title">Hitbox Matrix Kalibrierung</div>
        
        <div class="control-group">
            <span id="val-x">X-Offset: 20</span>
            <div class="btn-wrapper">
                <button onclick="adjust('x', -10)">-10</button>
                <button onclick="adjust('x', -1)">-1</button>
                <button onclick="adjust('x', 1)">+1</button>
                <button onclick="adjust('x', 10)">+10</button>
            </div>
        </div>
        <div class="control-group">
            <span id="val-y">Y-Offset: -106</span>
            <div class="btn-wrapper">
                <button onclick="adjust('y', -10)">-10</button>
                <button onclick="adjust('y', -1)">-1</button>
                <button onclick="adjust('y', 1)">+1</button>
                <button onclick="adjust('y', 10)">+10</button>
            </div>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #444; margin: 8px 0;">
        
        <div class="control-group">
            <span id="val-fx">X-Faktor: 1.00</span>
            <div class="btn-wrapper">
                <button onclick="adjust('fx', -0.1)">-0.1</button>
                <button onclick="adjust('fx', -0.01)">-.01</button>
                <button onclick="adjust('fx', 0.01)">+.01</button>
                <button onclick="adjust('fx', 0.1)">+0.1</button>
            </div>
        </div>
        <div class="control-group">
            <span id="val-fy">Y-Faktor: 1.00</span>
            <div class="btn-wrapper">
                <button onclick="adjust('fy', -0.1)">-0.1</button>
                <button onclick="adjust('fy', -0.01)">-.01</button>
                <button onclick="adjust('fy', 0.01)">+.01</button>
                <button onclick="adjust('fy', 0.1)">+0.1</button>
            </div>
        </div>
        <div style="font-size: 10px; color: #aaa; margin-top: 6px; line-height: 1.2;">
            1. Nutze <b>Faktor</b>, um den Abstand zwischen den Wänden/Tischen zu ändern.<br>
            2. Nutze <b>Offset</b>, um das gesamte fertige Konstrukt zu verschieben.
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>
    
    <div id="action-btn">USE</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const mapWidth = 1920;
        const mapHeight = 1080;

        // Startwerte basierend auf deinem Screenshot
        let offsetX = 20;
        let offsetY = -106;
        let factorX = 1.0;
        let factorY = 1.0;

        // Dreh- und Angelpunkt für das Skalieren ist das Zentrum des Emergency-Tisches
        const pivotX = 1062;
        const pivotY = 354;

        function adjust(type, amount) {
            if (type === 'x') offsetX += amount;
            if (type === 'y') offsetY += amount;
            if (type === 'fx') factorX = Math.max(0.1, factorX + amount);
            if (type === 'fy') factorY = Math.max(0.1, factorY + amount);
            
            document.getElementById('val-x').innerText = `X-Offset: ${offsetX}`;
            document.getElementById('val-y').innerText = `Y-Offset: ${offsetY}`;
            document.getElementById('val-fx').innerText = `X-Faktor: ${factorX.toFixed(2)}`;
            document.getElementById('val-fy').innerText = `Y-Faktor: ${factorY.toFixed(2)}`;
        }

        const textures = {};
        const sources = {
            map: 'assets/Map.png',
            player: 'assets/IMG_0964.webp'
        };
        
        let loadedCount = 0;
        for (let key in sources) {
            textures[key] = new Image();
            textures[key].src = sources[key];
            textures[key].onload = () => loadedCount++;
        }

        // Unveränderte Rohdaten der Hitboxen
        const baseHitboxes = [
            { x: 815,  y: 40,  width: 40,  height: 95 },
            { x: 815,  y: 40,  width: 250, height: 40 },
            { x: 1055, y: 40,  width: 250, height: 40 },
            { x: 1265, y: 40,  width: 40,  height: 95 },
            { x: 648,  y: 135, width: 45,  height: 300 },
            { x: 1428, y: 135, width: 45,  height: 300 },
            { x: 648,  y: 435, width: 230, height: 45 },
            { x: 835,  y: 480, width: 45,  height: 60 },
            { x: 1243, y: 435, width: 230, height: 45 },
            { x: 1243, y: 480, width: 45,  height: 60 },
            { x: 835,  y: 540, width: 140, height: 45 },
            { x: 1145, y: 540, width: 143, height: 45 },
            { x: 975,  y: 585, width: 15,  height: 300 },
            { x: 1132, y: 585, width: 15,  height: 300 }
        ];

        const baseCircleHitboxes = [
            { cx: 917,  cy: 218, radius: 52 },
            { cx: 1208, cy: 218, radius: 52 },
            { cx: 1062, cy: 354, radius: 52 }, // Center
            { cx: 917,  cy: 491, radius: 52 },
            { cx: 1208, cy: 491, radius: 52 }
        ];

        let player = {
            x: 1040, 
            y: 280,  
            width: 42,  
            height: 54, 
            speed: 5.5,
            vx: 0,
            vy: 0,
            facingRight: true
        };

        let camera = { x: 0, y: 0 };
        const keys = {};

        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickStartX = 0;
        let joystickStartY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        joystickZone.addEventListener('touchstart', e => {
            joystickActive = true;
            const rect = joystickZone.getBoundingClientRect();
            joystickStartX = rect.left + rect.width / 2;
            joystickStartY = rect.top + rect.height / 2;
        });

        window.addEventListener('touchmove', e => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystickStartX;
            let dy = touch.clientY - joystickStartY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 40;

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            player.vx = (dx / maxRadius) * player.speed;
            player.vy = (dy / maxRadius) * player.speed;
        });

        window.addEventListener('touchend', () => {
            joystickActive = false;
            joystickKnob.style.transform = 'translate(0px, 0px)';
            player.vx = 0;
            player.vy = 0;
        });

        // Hilfsfunktion zur dynamischen Matrix-Transformation einer Rechteck-Hitbox
        function getTransformedRect(box) {
            // Skaliere die Position relativ zum Pivot-Punkt
            let rx = pivotX + (box.x - pivotX) * factorX + offsetX;
            let ry = pivotY + (box.y - pivotY) * factorY + offsetY;
            // Skaliere die Ausdehnung der Hitbox selbst
            let rw = box.width * factorX;
            let rh = box.height * factorY;
            return { x: rx, y: ry, width: rw, height: rh };
        }

        // Hilfsfunktion zur dynamischen Matrix-Transformation einer Kreis-Hitbox
        function getTransformedCircle(circle) {
            let rcx = pivotX + (circle.cx - pivotX) * factorX + offsetX;
            let rcy = pivotY + (circle.cy - pivotY) * factorY + offsetY;
            let rRad = circle.radius * Math.max(factorX, factorY);
            return { cx: rcx, cy: rcy, radius: rRad };
        }

        function checkRectCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function resolveCircleCollision(playerObj, circle) {
            let closestX = Math.max(playerObj.x, Math.min(circle.cx, playerObj.x + playerObj.width));
            let closestY = Math.max(playerObj.y, Math.min(circle.cy, playerObj.y + playerObj.height));

            let distanceX = circle.cx - closestX;
            let distanceY = circle.cy - closestY;
            let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

            if (distanceSquared < circle.radius * circle.radius) {
                let distance = Math.sqrt(distanceSquared);
                if (distance === 0) return;

                let overlap = circle.radius - distance;
                let dirX = distanceX / distance;
                let dirY = distanceY / distance;

                playerObj.x -= dirX * overlap;
                playerObj.y -= dirY * overlap;
            }
        }

        function update() {
            if (keys['w'] || keys['arrowup']) player.vy = -player.speed;
            else if (keys['s'] || keys['arrowdown']) player.vy = player.speed;
            else if (!joystickActive) player.vy = 0;

            if (keys['a'] || keys['arrowleft']) { player.vx = -player.speed; player.facingRight = false; }
            else if (keys['d'] || keys['arrowright']) { player.vx = player.speed; player.facingRight = true; }
            else if (!joystickActive) player.vx = 0;

            if (joystickActive && player.vx !== 0) {
                player.facingRight = player.vx > 0;
            }

            // Bewegung auf X-Achse & Kollisionsprüfung
            player.x += player.vx;
            for (let box of baseHitboxes) {
                let tBox = getTransformedRect(box);
                if (checkRectCollision(player, tBox)) {
                    if (player.vx > 0) player.x = tBox.x - player.width;
                    if (player.vx < 0) player.x = tBox.x + tBox.width;
                }
            }

            // Bewegung auf Y-Achse & Kollisionsprüfung
            player.y += player.vy;
            for (let box of baseHitboxes) {
                let tBox = getTransformedRect(box);
                if (checkRectCollision(player, tBox)) {
                    if (player.vy > 0) player.y = tBox.y - player.height;
                    if (player.vy < 0) player.y = tBox.y + tBox.height;
                }
            }

            // Kreiskollisionen an den skalierten Tischen auflösen
            for (let circle of baseCircleHitboxes) {
                let tCircle = getTransformedCircle(circle);
                resolveCircleCollision(player, tCircle);
            }

            // Dynamische Kamera reaktiviert: Folgt der Spielfigur weich
            camera.x = player.x + player.width / 2 - canvas.width / 2;
            camera.y = player.y + player.height / 2 - canvas.height / 2;

            // Grenzen der Kamera auf Kartengröße festsetzen
            if (camera.x < 0) camera.x = 0;
            if (camera.y < 0) camera.y = 0;
            if (camera.x > mapWidth - canvas.width) camera.x = Math.max(0, mapWidth - canvas.width);
            if (camera.y > mapHeight - canvas.height) camera.y = Math.max(0, mapHeight - canvas.height);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Hintergrund-Map rendern
            if (textures.map && textures.map.complete && textures.map.naturalWidth !== 0) {
                ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
            } else {
                ctx.fillStyle = '#1e1e24';
                ctx.fillRect(0, 0, mapWidth, mapHeight);
            }

            // Rote Debug-Layer live transformiert rendern
            ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
            for (let box of baseHitboxes) {
                let tBox = getTransformedRect(box);
                ctx.fillRect(tBox.x, tBox.y, tBox.width, tBox.height);
            }
            for (let circle of baseCircleHitboxes) {
                let tCircle = getTransformedCircle(circle);
                ctx.beginPath();
                ctx.arc(tCircle.cx, tCircle.cy, tCircle.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            // Spielerfigur rendern
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
            if (!player.facingRight) ctx.scale(-1, 1);

            if (textures.player && textures.player.complete && textures.player.naturalWidth !== 0) {
                ctx.drawImage(textures.player, -player.width / 2, -player.height / 2, player.width, player.height);
            } else {
                ctx.fillStyle = '#da2222';
                ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
            }
            ctx.restore();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
