<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us Clone - Mobile Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        #debug-trigger-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(30, 30, 36, 0.7);
            color: #ef4444;
            border: 1.5px solid #ef4444;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: bold;
            font-family: monospace;
            border-radius: 4px;
            z-index: 50;
            cursor: pointer;
            letter-spacing: 1px;
        }
        #debug-trigger-btn:active {
            background: #ef4444;
            color: #000;
        }

        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 10;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 90px;
            height: 90px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            touch-action: none;
            z-index: 10;
            display: block;
        }
        #engineer-btn {
            position: absolute;
            bottom: 155px;
            right: 50px;
            width: 90px;
            height: 90px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            touch-action: none;
            z-index: 10;
            display: none;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        
        #role-selection-overlay, #debug-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 8, 0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        #debug-overlay {
            background: rgba(11, 11, 14, 0.95);
            display: none;
        }
        .window-title {
            font-size: 24px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-family: monospace;
        }
        .role-buttons, .debug-controls {
            display: flex;
            gap: 15px;
            flex-direction: row;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        .panel-btn {
            background: #1e1e24;
            color: #fff;
            border: 2px solid #3b82f6;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            border-radius: 8px;
            cursor: pointer;
        }
        .panel-btn:active {
            background: #3b82f6;
            color: #000;
        }
        #btn-engineer { border-color: #a855f7; }
        #btn-engineer:active { background: #a855f7; color: #000; }
        
        .debug-input {
            background: #16161a;
            border: 2px solid #4b5563;
            color: #fff;
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            width: 100px;
            text-align: center;
            font-family: monospace;
        }
        #debug-status-text {
            margin-top: 15px;
            font-family: monospace;
            font-size: 13px;
            color: #ef4444;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <button id="debug-trigger-btn" onclick="toggleDebugMenu()">DEBUG</button>

    <div id="role-selection-overlay">
        <h1 class="window-title">WÄHLE DEINE ROLLE</h1>
        <div class="role-buttons">
            <button class="panel-btn" id="btn-crewmate" onclick="selectRole('crewmate')">CREWMATE</button>
            <button class="panel-btn" id="btn-engineer" onclick="selectRole('engineer')">ENGINEER</button>
        </div>
    </div>

    <div id="debug-overlay">
        <h1 class="window-title">DEBUG / DEV MODE</h1>
        <div class="debug-controls">
            <input type="text" id="vent-id" class="debug-input" placeholder="ID (z.B. 1)" value="1">
            <input type="number" id="vent-size" class="debug-input" placeholder="Radius" value="25">
            <button class="panel-btn" onclick="startVentPlacement()">Vent platzieren</button>
            <button class="panel-btn" style="border-color:#ef4444" onclick="startVentRemoval()">Vent entfernen</button>
            <button class="panel-btn" style="border-color:#f97316" onclick="startWallRemoval()">Wand entfernen</button>
            <button class="panel-btn" style="border-color:#a855f7" onclick="copyVentsData()">Vents kopieren</button>
            <button class="panel-btn" style="border-color:#a855f7" onclick="copyWallsData()">Wände kopieren</button>
            <button class="panel-btn" style="border-color:#10b981" onclick="closeDebugMenu()">Schließen</button>
        </div>
        <p id="debug-status-text">Interaktions-Modus aktiv.</p>
    </div>

    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>
    
    <div id="action-btn"></div>

            { "x1": 1621, "y1": 405, "x2": 1539, "y2": 398 }, { "x1": 1534, "y1": 404, "x2": 1533, "y2": 256 },
            { "x1": 1535, "y1": 251, "x2": 1542, "y2": 215 }, { "x1": 1546, "y1": 213, "x2": 1586, "y2": 222 },
            { "x1": 1589, "y1": 220, "x2": 1586, "y2": 184 }, { "x1": 1586, "y1": 186, "x2": 1493, "y2": 104 },
            { "x1": 1497, "y1": 102, "x2": 1401, "y2": 101 }, { "x1": 1453, "y1": 110, "x2": 1451, "y2": 172 },
            { "x1": 1452, "y1": 177, "x2": 1433, "y2": 209 }, { "x1": 1431, "y1": 211, "x2": 1326, "y2": 211 }
        ];

        const pivotX = 1062;
        const pivotY = 354;
        const finalTables = [
            { cx: pivotX + (917 - pivotX) * 0.71 + 20, cy: pivotY + (218 - pivotY) * 0.77 - 110, radius: 52 * 0.77 },
            { cx: pivotX + (1208 - pivotX) * 0.71 + 20, cy: pivotY + (218 - pivotY) * 0.77 - 110, radius: 52 * 0.77 },
            { cx: pivotX + (1062 - pivotX) * 0.71 + 20, cy: pivotY + (354 - pivotY) * 0.77 - 110, radius: 52 * 0.77 },
            { cx: pivotX + (917 - pivotX) * 0.71 + 20, cy: pivotY + (491 - pivotY) * 0.77 - 110, radius: 52 * 0.77 },
            { cx: pivotX + (1208 - pivotX) * 0.71 + 20, cy: pivotY + (491 - pivotY) * 0.77 - 110, radius: 52 * 0.77 }
        ];

        const textures = {};
        const sources = {
            map: 'assets/Map.png',
            player: 'assets/IMG_0964.webp',
            useBtn: 'assets/use.webp',
            useSecBtn: 'assets/use_sec.webp',
            engBtn: 'assets/eng.webp'
        };

        let loadedImages = 0;
        const totalImages = Object.keys(sources).length;
        for (let key in sources) {
            textures[key] = new Image();
            textures[key].src = sources[key];
            textures[key].onload = () => {
                loadedImages++;
                if (loadedImages === totalImages) {
                    updateButtonTexture(false);
                    engineerBtn.style.backgroundImage = `url('${sources.engBtn}')`;
                }
            };
        }

        let player = {
            x: 1060,
            y: 260,
            radius: 10,
            width: 21,
            height: 27,
            speed: 4.5,
            vx: 0,
            vy: 0,
            facingRight: true
        };

        let camera = { x: 0, y: 0 };
        let isViewingSecurity = false;
        let nearSecurity = false;
        let nearVent = null;
        
        const keys = {};
        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        const actionBtn = document.getElementById('action-btn');
        const engineerBtn = document.getElementById('engineer-btn');
        const statusText = document.getElementById('debug-status-text');
        
        let joystickActive = false;
        let joystickStartX = 0, joystickStartY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function updateButtonTexture(isSec) {
            actionBtn.style.backgroundImage = `url('${isSec ? sources.useSecBtn : sources.useBtn}')`;
        }

        window.addEventListener('keydown', e => {
            if (!gameActive) return;
            if (e.key.toLowerCase() === 'm') toggleDebugMenu();
            keys[e.key.toLowerCase()] = true;
        });

        window.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        // Joystick-Steuerung
        joystickZone.addEventListener('touchstart', e => {
            if (!gameActive || isViewingSecurity) return;
            joystickActive = true;
            const touch = e.touches[0];
            const rect = joystickZone.getBoundingClientRect();
            joystickStartX = rect.left + rect.width / 2;
            joystickStartY = rect.top + rect.height / 2;
            handleJoystickMove(touch.clientX, touch.clientY);
        });

        joystickZone.addEventListener('touchmove', e => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            handleJoystickMove(touch.clientX, touch.clientY);
        });

        joystickZone.addEventListener('touchend', () => {
            joystickActive = false;
            joystickKnob.style.transform = 'translate(0px, 0px)';
            player.vx = 0;
            player.vy = 0;
        });

        function handleJoystickMove(clientX, clientY) {
            let dx = clientX - joystickStartX;
            let dy = clientY - joystickStartY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 40;

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            
            const speedScale = Math.min(distance / maxRadius, 1);
            const angle = Math.atan2(dy, dx);
            player.vx = Math.cos(angle) * player.speed * speedScale;
            player.vy = Math.sin(angle) * player.speed * speedScale;
            
            if (player.vx > 0.2) player.facingRight = true;
            if (player.vx < -0.2) player.facingRight = false;
        }

        // Action-Buttons Touch Handler
        actionBtn.addEventListener('touchstart', e => {
            e.preventDefault();
            if (nearSecurity) {
                isViewingSecurity = !isViewingSecurity;
            }
        });

        engineerBtn.addEventListener('touchstart', e => {
            e.preventDefault();
            if (playerRole !== 'engineer') return;
            
            if (isVenting) {
                isVenting = false;
                if (currentVentNode) {
                    player.x = currentVentNode.x;
                    player.y = currentVentNode.y;
                }
                engineerBtn.style.opacity = "0.4";
                removeVentNavigationButtons();
            } else if (nearVent) {
                isVenting = true;
                currentVentNode = nearVent;
                player.x = nearVent.x;
                player.y = nearVent.y;
                player.vx = 0;
                player.vy = 0;
                engineerBtn.style.opacity = "1.0";
                createVentNavigationButtons(nearVent);
            }
        });

        function selectRole(role) {
            playerRole = role;
            document.getElementById('role-selection-overlay').style.display = 'none';
            if (role === 'engineer') {
                engineerBtn.style.display = 'block';
            }
            gameActive = true;
            requestAnimationFrame(gameLoop);
        }

        function toggleDebugMenu() {
            debugMenuOpen = !debugMenuOpen;
            document.getElementById('debug-overlay').style.display = debugMenuOpen ? 'flex' : 'none';
        }

        function resetModes() {
            placementActive = false;
            removalActive = false;
            wallRemovalActive = false;
            statusText.innerText = "Interaktions-Modus aktiv.";
            statusText.style.color = "#a855f7";
        }

        function closeDebugMenu() {
            debugMenuOpen = false;
            document.getElementById('debug-overlay').style.display = 'none';
        }

        function startVentPlacement() {
            resetModes();
            placementActive = true;
            currentVentIdInput = document.getElementById('vent-id').value || "1";
            currentVentSizeInput = parseInt(document.getElementById('vent-size').value) || 25;
            statusText.innerText = "Klicke auf die Map, um ein Vent zu platzieren.";
            statusText.style.color = "#10b981";
            toggleDebugMenu();
        }

        function startVentRemoval() {
            resetModes();
            removalActive = true;
            statusText.innerText = "Klicke auf ein Vent, um es zu entfernen.";
            statusText.style.color = "#ef4444";
            toggleDebugMenu();
        }

        function startWallRemoval() {
            resetModes();
            wallRemovalActive = true;
            statusText.innerText = "Klicke nah an eine rote Wand-Hitbox, um sie zu löschen.";
            statusText.style.color = "#f97316";
            toggleDebugMenu();
        }

        function copyVentsData() {
            const jsonStr = JSON.stringify(vents, null, 4);
            navigator.clipboard.writeText(jsonStr).then(() => {
                statusText.innerText = "Vents JSON in die Zwischenablage kopiert!";
                statusText.style.color = "#10b981";
            }).catch(err => {
                statusText.innerText = "Fehler beim Kopieren.";
                statusText.style.color = "#ef4444";
            });
        }

        function copyWallsData() {
            const jsonStr = JSON.stringify(wallLines, null, 4);
            navigator.clipboard.writeText(jsonStr).then(() => {
                statusText.innerText = "Wände JSON in die Zwischenablage kopiert!";
                statusText.style.color = "#10b981";
            }).catch(err => {
                statusText.innerText = "Fehler beim Kopieren.";
                statusText.style.color = "#ef4444";
            });
        }

        canvas.addEventListener('click', e => {
            if (!placementActive && !removalActive && !wallRemovalActive) return;
            
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            const worldX = clickX - (canvas.width / 2 - player.x);
            const worldY = clickY - (canvas.height / 2 - player.y);

            if (placementActive) {
                vents.push({
                    id: currentVentIdInput,
                    x: Math.round(worldX),
                    y: Math.round(worldY),
                    radius: currentVentSizeInput
                });
                resetModes();
            } else if (removalActive) {
                vents = vents.filter(v => {
                    const dist = Math.sqrt((v.x - worldX)**2 + (v.y - worldY)**2);
                    return dist > v.radius;
                });
                resetModes();
            } else if (wallRemovalActive) {
                const maxClickDistance = 20; 
                
                wallLines = wallLines.filter(line => {
                    const x1 = line.x1; const y1 = line.y1;
                    const x2 = line.x2; const y2 = line.y2;
                    
                    const l2 = (x2 - x1)**2 + (y2 - y1)**2;
                    if (l2 === 0) return true;
                    
                    let t = ((worldX - x1) * (x2 - x1) + (worldY - y1) * (y2 - y1)) / l2;
                    t = Math.max(0, Math.min(1, t));
                    
                    const closestX = x1 + t * (x2 - x1);
                    const closestY = y1 + t * (y2 - y1);
                    
                    const dist = Math.sqrt((worldX - closestX)**2 + (worldY - closestY)**2);
                    return dist > maxClickDistance;
                });
                resetModes();
            }
        });

        function createVentNavigationButtons(ventNode) {
            removeVentNavigationButtons();
            const targets = vents.filter(v => v.id === ventNode.id && v !== ventNode);
            
            targets.forEach((target, index) => {
                const btn = document.createElement('button');
                btn.className = 'panel-btn';
                btn.style.position = 'absolute';
                btn.style.bottom = `${150 + index * 60}px`;
                btn.style.left = '50%';
                btn.style.transform = 'translateX(-50%)';
                btn.style.borderColor = '#a855f7';
                btn.innerText = `Zu Vent #${index + 1}`;
                
                btn.addEventListener('touchstart', e => {
                    e.preventDefault();
                    if (!isVenting) return;
                    currentVentNode = target;
                    player.x = target.x;
                    player.y = target.y;
                    createVentNavigationButtons(target);
                });
                
                document.body.appendChild(btn);
                activeVentButtons.push(btn);
            });
        }

        function removeVentNavigationButtons() {
            activeVentButtons.forEach(btn => btn.remove());
            activeVentButtons = [];
        }

        function getWallCollisionVector(px, py, radius) {
            let minPushX = 0;
            let minPushY = 0;
            let maxOverlap = 0;
            let collided = false;

            for (let line of wallLines) {
                const x1 = line.x1;
                const y1 = line.y1;
                const x2 = line.x2;
                const y2 = line.y2;

                const l2 = (x2 - x1)**2 + (y2 - y1)**2;
                if (l2 === 0) continue;

                let t = ((px - x1) * (x2 - x1) + (py - y1) * (y2 - y1)) / l2;
                t = Math.max(0, Math.min(1, t));

                const closestX = x1 + t * (x2 - x1);
                const closestY = y1 + t * (y2 - y1);

                const dx = px - closestX;
                const dy = py - closestY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const minDist = radius + wallThickness / 2;

                if (dist < minDist) {
                    collided = true;
                    const overlap = minDist - dist;
                    const nx = dist > 0 ? dx / dist : 0;
                    const ny = dist > 0 ? dy / dist : 1;

                    if (overlap > maxOverlap) {
                        maxOverlap = overlap;
                        minPushX = nx * overlap;
                        minPushY = ny * overlap;
                    }
                }
            }
            return collided ? { x: minPushX, y: minPushY } : null;
        }

        function getTableCollisionVector(px, py, radius) {
            for (let table of finalTables) {
                const dx = px - table.cx;
                const dy = py - table.cy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const minDist = radius + table.radius;

                if (dist < minDist) {
                    const overlap = minDist - dist;
                    const nx = dist > 0 ? dx / dist : 0;
                    const ny = dist > 0 ? dy / dist : 1;
                    return { x: nx * overlap, y: ny * overlap };
                }
            }
            return null;
        }

        function isPointInVision(x, y, cam) {
            const dx = x - cam.x;
            const dy = y - cam.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > cam.range) return false;
            let angle = Math.atan2(dy, dx);
            if (angle < 0) angle += Math.PI * 2;
            let diff = Math.abs(angle - cam.angle);
            if (diff > Math.PI) diff = Math.PI * 2 - diff;
            return diff <= cam.fov / 2;
        }

        function drawCameraVisionSquare(cam) {
            ctx.fillStyle = 'rgba(239, 68, 68, 0.15)';
            ctx.beginPath();
            ctx.moveTo(cam.x, cam.y);
            const steps = 20;
            const startAngle = cam.angle - cam.fov / 2;
            for (let i = 0; i <= steps; i++) {
                const a = startAngle + (cam.fov * i / steps);
                ctx.lineTo(cam.x + Math.cos(a) * cam.range, cam.y + Math.sin(a) * cam.range);
            }
            ctx.closePath();
            ctx.fill();
        }

        function gameLoop() {
            if (!gameActive) return;

            if (!joystickActive) {
                player.vx = 0;
                player.vy = 0;
                if (keys['w'] || keys['arrowup']) player.vy = -player.speed;
                if (keys['s'] || keys['arrowdown']) player.vy = player.speed;
                if (keys['a'] || keys['arrowleft']) { player.vx = -player.speed; player.facingRight = false; }
                if (keys['d'] || keys['arrowright']) { player.vx = player.speed; player.facingRight = true; }
            }

            if (!isVenting && !isViewingSecurity) {
                player.x += player.vx;
                
                let wallPush = getWallCollisionVector(player.x, player.y, player.radius);
                if (wallPush) {
                    player.x += wallPush.x;
                    player.y += wallPush.y;
                }
                let tablePush = getTableCollisionVector(player.x, player.y, player.radius);
                if (tablePush) {
                    player.x += tablePush.x;
                    player.y += tablePush.y;
                }

                player.y += player.vy;
                
                wallPush = getWallCollisionVector(player.x, player.y, player.radius);
                if (wallPush) {
                    player.x += wallPush.x;
                    player.y += wallPush.y;
                }
                tablePush = getTableCollisionVector(player.x, player.y, player.radius);
                if (tablePush) {
                    player.x += tablePush.x;
                    player.y += tablePush.y;
                }

                player.x = Math.max(player.radius, Math.min(mapWidth - player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(mapHeight - player.radius, player.y));
            }

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;

            const secDist = Math.sqrt((player.x - gameConfig.securityScreen.cx)**2 + (player.y - gameConfig.securityScreen.cy)**2);
            if (secDist < gameConfig.securityScreen.interactRange) {
                if (!nearSecurity) {
                    nearSecurity = true;
                    updateButtonTexture(true);
                }
            } else {
                if (nearSecurity) {
                    nearSecurity = false;
                    isViewingSecurity = false;
                    updateButtonTexture(false);
                }
            }

            nearVent = null;
            if (playerRole === 'engineer' && !isVenting) {
                for (let vent of vents) {
                    const vDist = Math.sqrt((player.x - vent.x)**2 + (player.y - vent.y)**2);
                    if (vDist < vent.radius + 15) {
                        nearVent = vent;
                        break;
                    }
                }
            }
            if (playerRole === 'engineer') {
                engineerBtn.style.opacity = (nearVent || isVenting) ? "1.0" : "0.4";
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (isViewingSecurity) {
                const w = canvas.width / 2;
                const h = canvas.height / 2;
                
                gameConfig.cameras.forEach((cam, index) => {
                    const pos = [
                        { x: 0, y: 0 }, { x: w, y: 0 },
                        { x: 0, y: h }, { x: w, y: h }
                    ][index];

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(pos.x, pos.y, w, h);
                    ctx.clip();

                    ctx.translate(pos.x - cam.x + w / 2, pos.y - cam.y + h / 2);
                    if (textures.map && textures.map.complete) ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
                    
                    drawCameraVisionSquare(cam);
                    
                    if (!isVenting && isPointInVision(player.x, player.y, cam)) {
                        ctx.save();
                        ctx.translate(player.x, player.y);
                        if (!player.facingRight) ctx.scale(-1, 1);
                        if (textures.player && textures.player.complete) ctx.drawImage(textures.player, -player.width/2, -player.height/2, player.width, player.height);
                        ctx.restore();
                    }
                    ctx.restore();

                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(pos.x, pos.y, w, h);

                    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    ctx.fillRect(pos.x + 10, pos.y + 10, 185, 30);
                    ctx.fillStyle = '#00ffcc';
                    ctx.font = 'bold 11px monospace';
                    ctx.fillText(`CAM: ${cam.id}`, pos.x + 15, pos.y + 28);
                });

                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(canvas.width / 2 - 150, canvas.height - 50, 300, 40);
                ctx.fillStyle = '#ef4444';
                ctx.font = 'bold 14px monospace';
                ctx.textAlign = 'center';
                ctx.fillText("LIVE CAMERA FEEDS - TOUCH USE TO EXIT", canvas.width / 2, canvas.height - 25);
                ctx.textAlign = 'left';

            } else {
                ctx.save();
                ctx.translate(-camera.x, -camera.y);

                if (textures.map && textures.map.complete) {
                    ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
                }

                vents.forEach(vent => {
                    ctx.fillStyle = 'rgba(50, 50, 50, 0.8)';
                    ctx.strokeStyle = '#a855f7';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(vent.x, vent.y, vent.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    
                    if (debugMode) {
                        ctx.fillStyle = '#fff';
                        ctx.font = '10px monospace';
                        ctx.fillText(`ID:${vent.id}`, vent.x - 12, vent.y + 4);
                    }
                });

                if (debugMode) {
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.3)';
                    ctx.beginPath();
                    ctx.arc(gameConfig.securityScreen.cx, gameConfig.securityScreen.cy, gameConfig.securityScreen.radius, 0, Math.PI * 2);
                    ctx.fill();
                }

                gameConfig.cameras.forEach(cam => {
                    drawCameraVisionSquare(cam);
                    ctx.fillStyle = '#ef4444';
                    ctx.beginPath();
                    ctx.arc(cam.x, cam.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                });

                if (debugMode) {
                    finalTables.forEach(table => {
                        ctx.fillStyle = 'rgba(234, 179, 8, 0.2)';
                        ctx.strokeStyle = '#eab308';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.arc(table.cx, table.cy, table.radius, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                    });
                }

                if (debugMode) {
                    ctx.strokeStyle = 'rgba(239, 68, 68, 0.7)';
                    ctx.lineWidth = wallThickness;
                    ctx.lineCap = 'round';
                    wallLines.forEach(line => {
                        ctx.beginPath();
                        ctx.moveTo(line.x1, line.y1);
                        ctx.lineTo(line.x2, line.y2);
                        ctx.stroke();
                    });
                }

                if (!isVenting) {
                    ctx.save();
                    ctx.translate(player.x, player.y);
                    
                    if (debugMode) {
                        ctx.fillStyle = 'rgba(16, 185, 129, 0.4)';
                        ctx.beginPath();
                        ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    if (!player.facingRight) {
                        ctx.scale(-1, 1);
                    }

                    if (textures.player && textures.player.complete) {
                        ctx.drawImage(
                            textures.player,
                            -player.width / 2,
                            -player.height / 2,
                            player.width,
                            player.height
                        );
                    } else {
                        ctx.fillStyle = '#ef4444';
                        ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
                    }
                    ctx.restore();
                }

                ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
