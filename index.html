<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us Clone - Fixed Full Map Painter</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #editor-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            border: 1px solid #00ffcc;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .panel-title {
            font-weight: bold;
            color: #00ffcc;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }
        button {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }
        button:active {
            background: #00ffcc;
            color: #000;
        }
        #json-output {
            width: 100%;
            height: 110px;
            background: #151518;
            color: #00ff66;
            border: 1px solid #444;
            font-family: monospace;
            font-size: 10px;
            padding: 5px;
            resize: none;
            white-space: pre;
            overflow-y: scroll;
            -webkit-user-select: text;
            user-select: text;
        }
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 110px;
            height: 110px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 10;
        }
        #joystick-knob {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="editor-panel">
        <div class="panel-title">🗺️ Full-Map Line Painter (Fixed)</div>
        <div style="color: #aaa; font-size: 10px; line-height: 1.3;">
            Der Versatz wurde behoben. Linien entstehen jetzt exakt unter dem Finger.
        </div>
        <button onclick="deleteLastWall()">Letzte Linie löschen</button>
        <button onclick="clearAllWalls()" style="background: #552222; border-color: #773333;">Alle neuen Linien löschen</button>
        
        <div style="font-weight: bold; margin-top: 4px; font-size: 11px;">Gesamt-JSON (inkl. Cafeteria):</div>
        <textarea id="json-output" readonly onclick="this.select(); document.execCommand('copy'); alert('Komplette Map-JSON kopiert!');">[ ]</textarea>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const mapWidth = 1920;
        const mapHeight = 1080;
        const wallThickness = 15;

        const cafLines = [
            { "x1": 1206, "y1": 34,  "x2": 1333, "y2": 165 },
            { "x1": 1326, "y1": 146, "x2": 1324, "y2": 215 },
            { "x1": 1198, "y1": 35,  "x2": 901,  "y2": 33  },
            { "x1": 944,  "y1": 32,  "x2": 866,  "y2": 109 },
            { "x1": 859,  "y1": 211, "x2": 860,  "y2": 86  },
            { "x1": 857,  "y1": 270, "x2": 857,  "y2": 360 },
            { "x1": 858,  "y1": 368, "x2": 957,  "y2": 471 },
            { "x1": 958,  "y1": 474, "x2": 1055, "y2": 472 },
            { "x1": 1121, "y1": 471, "x2": 1215, "y2": 471 },
            { "x1": 1329, "y1": 358, "x2": 1222, "y2": 466 },
            { "x1": 1322, "y1": 270, "x2": 1326, "y2": 361 }
        ];

        let newLines = [];

        // Tische
        const tableOffsetX = 20;
        const tableOffsetY = -110;
        const tableFactorX = 0.71;
        const tableFactorY = 0.77;
        const pivotX = 1062;
        const pivotY = 354;

        const baseCircleHitboxes = [
            { cx: 917,  cy: 218, radius: 52 },
            { cx: 1208, cy: 218, radius: 52 },
            { cx: 1062, cy: 354, radius: 52 },
            { cx: 917,  cy: 491, radius: 52 },
            { cx: 1208, cy: 491, radius: 52 }
        ];

        function getTransformedCircle(circle) {
            let rcx = pivotX + (circle.cx - pivotX) * tableFactorX + tableOffsetX;
            let rcy = pivotY + (circle.cy - pivotY) * tableFactorY + tableOffsetY;
            let rRad = circle.radius * Math.max(tableFactorX, tableFactorY);
            return { cx: rcx, cy: rcy, radius: rRad };
        }

        let player = {
            x: 1040, 
            y: 280,  
            vx: 0,
            vy: 0,
            speed: 10
        };

        let camera = { x: 200, y: 100 };

        const textures = {};
        const sources = { map: 'assets/Map.png' };
        for (let key in sources) {
            textures[key] = new Image();
            textures[key].src = sources[key];
        }

        // Joystick-Handling
        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickStartX = 0, joystickStartY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        joystickZone.addEventListener('touchstart', e => {
            joystickActive = true;
            const rect = joystickZone.getBoundingClientRect();
            joystickStartX = rect.left + rect.width / 2;
            joystickStartY = rect.top + rect.height / 2;
            e.stopPropagation(); 
        });

        window.addEventListener('touchmove', e => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystickStartX;
            let dy = touch.clientY - joystickStartY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 35;

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            player.vx = (dx / maxRadius) * player.speed;
            player.vy = (dy / maxRadius) * player.speed;
            e.stopPropagation();
        });

        window.addEventListener('touchend', () => {
            joystickActive = false;
            joystickKnob.style.transform = 'translate(0px, 0px)';
            player.vx = 0;
            player.vy = 0;
        });

        // --- FIXED TOUCH-COORDINATES SYSTEM ---
        let isDrawing = false;
        let startX = 0, startY = 0;
        let currentX = 0, currentY = 0;

        // Rechnet die Viewport-Touchdaten präzise in Map-Koordinaten um
        function getMapCoords(touchEvt) {
            const rect = canvas.getBoundingClientRect();
            const canvasX = touchEvt.clientX - rect.left;
            const canvasY = touchEvt.clientY - rect.top;
            return {
                x: Math.round(canvasX + camera.x),
                y: Math.round(canvasY + camera.y)
            };
        }

        window.addEventListener('touchstart', e => {
            if (e.target.closest('#editor-panel') || e.target.closest('#joystick-zone')) return;
            
            isDrawing = true;
            const coords = getMapCoords(e.touches[0]);
            startX = coords.x;
            startY = coords.y;
            currentX = startX;
            currentY = startY;
        });

        window.addEventListener('touchmove', e => {
            if (!isDrawing) return;
            const coords = getMapCoords(e.touches[0]);
            currentX = coords.x;
            currentY = coords.y;
        });

        window.addEventListener('touchend', e => {
            if (!isDrawing) return;
            isDrawing = false;

            let dx = currentX - startX;
            let dy = currentY - startY;
            let len = Math.sqrt(dx * dx + dy * dy);

            if (len > 8) {
                newLines.push({
                    x1: startX,
                    y1: startY,
                    x2: currentX,
                    y2: currentY
                });
                updateJSONOutput();
            }
        });

        function deleteLastWall() {
            newLines.pop();
            updateJSONOutput();
        }

        function clearAllWalls() {
            if(confirm("Alle neu gezeichneten Linien löschen?")) {
                newLines = [];
                updateJSONOutput();
            }
        }

        function updateJSONOutput() {
            const fullMapArray = [...cafLines, ...newLines];
            document.getElementById('json-output').value = JSON.stringify(fullMapArray, null, 2);
        }

        function update() {
            player.x += player.vx;
            player.y += player.vy;

            if (player.x < 0) player.x = 0;
            if (player.y < 0) player.y = 0;
            if (player.x > mapWidth) player.x = mapWidth;
            if (player.y > mapHeight) player.y = mapHeight;

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;

            if (camera.x < 0) camera.x = 0;
            if (camera.y < 0) camera.y = 0;
            if (camera.x > mapWidth - canvas.width) camera.x = Math.max(0, mapWidth - canvas.width);
            if (camera.y > mapHeight - canvas.height) camera.y = Math.max(0, mapHeight - canvas.height);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            if (textures.map && textures.map.complete && textures.map.naturalWidth !== 0) {
                ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
            } else {
                ctx.fillStyle = '#1e1e24';
                ctx.fillRect(0, 0, mapWidth, mapHeight);
            }

            ctx.lineWidth = wallThickness;
            ctx.lineCap = 'round';

            // Cafeteria (Grün)
            ctx.strokeStyle = 'rgba(0, 255, 100, 0.5)';
            for (let line of cafLines) {
                ctx.beginPath();
                ctx.moveTo(line.x1, line.y1);
                ctx.lineTo(line.x2, line.y2);
                ctx.stroke();
            }

            // Tische (Blau)
            ctx.fillStyle = 'rgba(0, 100, 255, 0.35)';
            for (let circle of baseCircleHitboxes) {
                let tCircle = getTransformedCircle(circle);
                ctx.beginPath();
                ctx.arc(tCircle.cx, tCircle.cy, tCircle.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            // Neue Linien (Rot)
            ctx.strokeStyle = 'rgba(255, 0, 50, 0.6)';
            for (let line of newLines) {
                ctx.beginPath();
                ctx.moveTo(line.x1, line.y1);
                ctx.lineTo(line.x2, line.y2);
                ctx.stroke();
            }

            // Live-Vorschau (Orange)
            if (isDrawing) {
                ctx.strokeStyle = 'rgba(255, 150, 0, 0.7)';
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            }

            // Kamera-Fokus
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(player.x, player.y, 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        updateJSONOutput();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
