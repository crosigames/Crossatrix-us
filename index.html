<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us Clone</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        /* Mobile Touch Controls */
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transition: transform 0.05s linear;
        }
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 80px;
            height: 80px;
            background: rgba(180, 180, 180, 0.4);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        #action-btn.active {
            background: rgba(240, 190, 20, 0.8);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>
    
    <div id="action-btn">USE</div>

    <script>
        // ==========================================
        // TEXTURE CONFIGURATION (Points to assets/)
        // ==========================================
        const TEXTURE_PATHS = {
            map: 'assets/IMG_0960.webp',        // Deine Map
            player: 'assets/IMG_0964.webp',     // Dein animierter Charakter
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Texturen-Ladesystem
        const textures = {};
        let texturesLoaded = 0;
        const totalTextures = Object.keys(TEXTURE_PATHS).length;

        // Feste virtuelle Map-Größe, damit Koordinaten IMMER stimmen!
        const mapWidth = 2400;
        const mapHeight = 1400;

        // ==========================================
        // COLLISION BOXES (Method 2: Rectangles)
        // ==========================================
        const hitboxes = [
            // --- Außenwände (Fest auf die 2400x1400 Map skaliert) ---
            { x: 0, y: 0, width: 2400, height: 140 },                  
            { x: 0, y: 1280, width: 2400, height: 120 },    
            { x: 0, y: 0, width: 220, height: 1400 },                  
            { x: 2180, y: 0, width: 220, height: 1400 },    

            // --- Cafeteria Tische (Mitte oben) ---
            { x: 1050, y: 220, width: 100, height: 100 }, 
            { x: 1250, y: 220, width: 100, height: 100 },
            { x: 1150, y: 350, width: 100, height: 100 }
        ];

        // Spieler-Setup
        let player = {
            x: 1180, // Startet jetzt exakt in der Mitte der Cafeteria
            y: 520,
            width: 60,  
            height: 75, 
            speed: 5,
            vx: 0,
            vy: 0,
            facingRight: true
        };

        let camera = { x: 0, y: 0 };
        const keys = {};

        // Touch-Steuerung Variablen
        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickStartX = 0;
        let joystickStartY = 0;

        function loadTextures() {
            for (let key in TEXTURE_PATHS) {
                textures[key] = new Image();
                textures[key].src = TEXTURE_PATHS[key];
                textures[key].onload = () => {
                    texturesLoaded++;
                    if (texturesLoaded === totalTextures) initGame();
                };
                textures[key].onerror = () => {
                    console.warn(`Datei fehlt im Ordner assets/: ${TEXTURE_PATHS[key]}`);
                    texturesLoaded++;
                    if (texturesLoaded === totalTextures) initGame();
                };
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.imageSmoothingEnabled = false; 
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Tastatur-Abfrage
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // Mobile Joystick Logik
        joystickZone.addEventListener('touchstart', e => {
            joystickActive = true;
            const rect = joystickZone.getBoundingClientRect();
            joystickStartX = rect.left + rect.width / 2;
            joystickStartY = rect.top + rect.height / 2;
        });

        window.addEventListener('touchmove', e => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystickStartX;
            let dy = touch.clientY - joystickStartY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 40;

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            player.vx = (dx / maxRadius) * player.speed;
            player.vy = (dy / maxRadius) * player.speed;
        });

        window.addEventListener('touchend', () => {
            joystickActive = false;
            joystickKnob.style.transform = 'translate(0px, 0px)';
            player.vx = 0;
            player.vy = 0;
        });

        // Use Button Action
        document.getElementById('action-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            console.log("USE triggered");
        });

        // Kollisions-Prüfung (AABB)
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function update() {
            // Tastatur-Input überschreibt Joystick-Input
            if (keys['w'] || keys['arrowup']) player.vy = -player.speed;
            else if (keys['s'] || keys['arrowdown']) player.vy = player.speed;
            else if (!joystickActive) player.vy = 0;

            if (keys['a'] || keys['arrowleft']) { player.vx = -player.speed; player.facingRight = false; }
            else if (keys['d'] || keys['arrowright']) { player.vx = player.speed; player.facingRight = true; }
            else if (!joystickActive) player.vx = 0;

            if (joystickActive && player.vx !== 0) {
                player.facingRight = player.vx > 0;
            }

            // X-Achse bewegen & Kollisionen auflösen
            player.x += player.vx;
            for (let box of hitboxes) {
                if (checkCollision(player, box)) {
                    if (player.vx > 0) player.x = box.x - player.width;
                    if (player.vx < 0) player.x = box.x + box.width;
                }
            }

            // Y-Achse bewegen & Kollisionen auflösen
            player.y += player.vy;
            for (let box of hitboxes) {
                if (checkCollision(player, box)) {
                    if (player.vy > 0) player.y = box.y - player.height;
                    if (player.vy < 0) player.y = box.y + box.height;
                }
            }

            // Kamera auf Spieler zentrieren
            camera.x = player.x + player.width / 2 - canvas.width / 2;
            camera.y = player.y + player.height / 2 - canvas.height / 2;

            // Kamera-Begrenzung am Map-Rand (Verhindert Out-of-Bounds Ruckeln)
            const maxCamX = mapWidth - canvas.width;
            const maxCamY = mapHeight - canvas.height;

            if (camera.x < 0) camera.x = 0;
            if (camera.y < 0) camera.y = 0;
            if (maxCamX > 0 && camera.x > maxCamX) camera.x = maxCamX;
            if (maxCamY > 0 && camera.y > maxCamY) camera.y = maxCamY;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // 1. Hintergrund / Map zeichnen (Wird jetzt IMMER auf mapWidth/mapHeight gestreckt!)
            if (textures.map && textures.map.complete && textures.map.naturalWidth !== 0) {
                ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
            } else {
                ctx.fillStyle = '#1e1e24';
                ctx.fillRect(0, 0, mapWidth, mapHeight);
            }

            // --- HITBOXEN-VISUALISIERUNG (Zeigt rote Blöcke auf den Wänden an) ---
            ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
            for (let box of hitboxes) {
                ctx.fillRect(box.x, box.y, box.width, box.height);
            }

            // 2. Animierten Charakter zeichnen
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
            
            // Textur horizontal spiegeln, wenn der Charakter nach links läuft
            if (!player.facingRight) ctx.scale(-1, 1);

            if (textures.player && textures.player.complete && textures.player.naturalWidth !== 0) {
                ctx.drawImage(textures.player, -player.width / 2, -player.height / 2, player.width, player.height);
            } else {
                ctx.fillStyle = '#da2222';
                ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
            }
            ctx.restore();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function initGame() {
            requestAnimationFrame(loop);
        }

        loadTextures();
    </script>
</body>
</html>
