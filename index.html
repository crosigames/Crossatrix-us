<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us Clone - Mobile Debug Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 10;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 90px;
            height: 90px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            touch-action: none;
            z-index: 10;
            display: block;
        }
        /* Erweitertes Debug UI für Mobile & Konfiguration */
        #debug-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.9);
            color: #00ffcc;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            z-index: 100;
            width: 90%;
            max-width: 340px;
            max-height: 85vh;
            overflow-y: auto;
            display: none;
            border: 1px solid #00ffcc;
            -webkit-overflow-scrolling: touch;
        }
        .debug-section {
            border-bottom: 1px solid #333;
            padding: 6px 0;
            margin-bottom: 6px;
        }
        .debug-section label {
            display: block;
            margin: 4px 0;
            user-select: text;
            -webkit-user-select: text;
        }
        .cam-edit-row {
            display: flex;
            gap: 4px;
            margin-bottom: 4px;
        }
        .cam-edit-row input {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 2px 4px;
            font-size: 11px;
            border-radius: 2px;
        }
        .cam-name { width: 55%; }
        .cam-range { width: 45%; }
        #debug-json {
            width: 100%;
            height: 70px;
            background: #111;
            color: #fff;
            border: 1px solid #333;
            margin-top: 5px;
            font-size: 10px;
            white-space: pre;
            overflow-x: scroll;
            user-select: text;
            -webkit-user-select: text;
        }
        #debug-toggle-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,0,0,0.6);
            color: white;
            border: none;
            padding: 6px 12px;
            font-family: monospace;
            z-index: 100;
            border-radius: 4px;
        }
        input[type="radio"] {
            margin-right: 5px;
            accent-color: #00ffcc;
        }
    </style>
</head>

    <div id="action-btn"></div>

            { cx: pivotX + (1208 - pivotX) * 0.71 + 20, cy: pivotY + (491 - pivotY) * 0.77 - 110, radius: 52 * 0.77 }
        ];

        const textures = {};
        const sources = {
            map: 'assets/Map.png',
            player: 'assets/IMG_0964.webp',
            useBtn: 'assets/use.webp',
            useSecBtn: 'assets/use_sec.webp'
        };
        
        let loadedImages = 0;
        const totalImages = Object.keys(sources).length;
        for (let key in sources) {
            textures[key] = new Image();
            textures[key].src = sources[key];
            textures[key].onload = () => {
                loadedImages++;
                if (loadedImages === totalImages) updateButtonTexture(false);
            };
        }

        let player = { x: 1060, y: 260, radius: 10, width: 21, height: 27, speed: 4.5, vx: 0, vy: 0, facingRight: true };
        let camera = { x: 0, y: 0 };
        let isViewingSecurity = false; 
        let nearSecurity = false;      
        let debugMode = false;

        const keys = {};
        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        const actionBtn = document.getElementById('action-btn');
        let joystickActive = false;
        let joystickStartX = 0, joystickStartY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function updateButtonTexture(isSec) {
            actionBtn.style.backgroundImage = `url('${isSec ? sources.useSecBtn : sources.useBtn}')`;
        }

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.ctrlKey && e.key.toLowerCase() === 'm') {
                e.preventDefault();
                toggleDebugMode();
            }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function toggleDebugMode() {
            debugMode = !debugMode;
            document.getElementById('debug-ui').style.display = debugMode ? 'block' : 'none';
            document.getElementById('debug-toggle-btn').style.background = debugMode ? '#00ffcc' : 'rgba(255,0,0,0.6)';
            document.getElementById('debug-toggle-btn').style.color = debugMode ? '#000' : '#fff';
            if(debugMode) {
                buildCamInputFields();
                syncDebugJSON();
            }
        }

        // Dynamische Generierung der Input Felder für Namen & Weiten im Debug-Menü
        function buildCamInputFields() {
            const container = document.getElementById('cam-inputs-container');
            container.innerHTML = '';
            gameConfig.cameras.forEach((cam, idx) => {
                const row = document.createElement('div');
                row.className = 'cam-edit-row';
                row.innerHTML = `
                    <span style="width:20px; color:#aaa;">${idx+1}:</span>
                    <input type="text" class="cam-name" value="${cam.id}" placeholder="Name" data-idx="${idx}">
                    <input type="number" class="cam-range" value="${cam.range}" placeholder="Range" data-idx="${idx}">
                `;
                container.appendChild(row);
            });

            // Event-Listener für Live-Updates der Felder
            container.querySelectorAll('.cam-name').forEach(input => {
                input.addEventListener('input', e => {
                    let idx = parseInt(e.target.dataset.idx);
                    gameConfig.cameras[idx].id = e.target.value;
                    syncDebugJSON();
                });
            });
            container.querySelectorAll('.cam-range').forEach(input => {
                input.addEventListener('input', e => {
                    let idx = parseInt(e.target.dataset.idx);
                    let val = parseInt(e.target.value) || 0;
                    gameConfig.cameras[idx].range = val;
                    syncDebugJSON();
                });
            });
        }

        function syncDebugJSON() {
            document.getElementById('debug-json').value = JSON.stringify(gameConfig, null, 4);
        }

        // Pointer/Click Event-Handling für Desktops UND Mobile Screens gleichermaßen
        function handleMapClick(clientX, clientY) {
            if (!debugMode) return;
            
            let rect = canvas.getBoundingClientRect();
            let clickX = clientX - rect.left + camera.x;
            let clickY = clientY - rect.top + camera.y;

            // Welches Radio-Button Target ist gerade aktiv?
            const activeTarget = document.querySelector('input[name="placement-target"]:checked').value;

            if (activeTarget === 'screen') {
                gameConfig.securityScreen.cx = Math.round(clickX);
                gameConfig.securityScreen.cy = Math.round(clickY);
            } else if (activeTarget.startsWith('cam-')) {
                let idx = parseInt(activeTarget.split('-')[1]);
                gameConfig.cameras[idx].x = Math.round(clickX);
                gameConfig.cameras[idx].y = Math.round(clickY);
            }
            syncDebugJSON();
        }

        // Native Event-Abfragen für Klick/Touch auf dem Canvas
        canvas.addEventListener('click', e => {
            if(debugMode) handleMapClick(e.clientX, e.clientY);
        });
        canvas.addEventListener('touchstart', e => {
            if(debugMode && e.touches.length > 0) {
                // Verhindert Scrolling während der Platzierung im Debug Mode
                e.preventDefault(); 
                handleMapClick(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });


        // Joystick Logic
        joystickZone.addEventListener('touchstart', e => {
            if (isViewingSecurity || debugMode) return;
            joystickActive = true;
            const rect = joystickZone.getBoundingClientRect();
            joystickStartX = rect.left + rect.width / 2;
            joystickStartY = rect.top + rect.height / 2;
        });

        window.addEventListener('touchmove', e => {
            if (!joystickActive || isViewingSecurity) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystickStartX;
            let dy = touch.clientY - joystickStartY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 40;

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            player.vx = (dx / maxRadius) * player.speed;
            player.vy = (dy / maxRadius) * player.speed;
        });

        const endJoystick = () => {
            joystickActive = false;
            joystickKnob.style.transform = 'translate(0px, 0px)';
            player.vx = 0; player.vy = 0;
        };
        window.addEventListener('touchend', endJoystick);

        actionBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (nearSecurity) {
                isViewingSecurity = !isViewingSecurity;
                joystickZone.style.display = isViewingSecurity ? 'none' : 'flex';
                if (isViewingSecurity) endJoystick();
            }
        });

        // Kollisionen
        function resolveLineCollision(p, line) {
            let dx = line.x2 - line.x1; let dy = line.y2 - line.y1;
            let lenSq = dx * dx + dy * dy; if (lenSq === 0) return;
            let t = Math.max(0, Math.min(1, ((p.x - line.x1) * dx + (p.y - line.y1) * dy) / lenSq));
            let closestX = line.x1 + t * dx; let closestY = line.y1 + t * dy;
            let distVecX = p.x - closestX; let distVecY = p.y - closestY;
            let distance = Math.sqrt(distVecX * distVecX + distVecY * distVecY);
            let minDist = p.radius + (wallThickness / 2);
            if (distance < minDist && distance !== 0) {
                let overlap = minDist - distance;
                p.x += (distVecX / distance) * overlap; p.y += (distVecY / distance) * overlap;
            }
        }

        function resolveCircleCollision(p, circle) {
            let dx = p.x - circle.cx; let dy = p.y - circle.cy;
            let distance = Math.sqrt(dx * dx + dy * dy);
            let minDist = p.radius + circle.radius;
            if (distance < minDist && distance !== 0) {
                let overlap = minDist - distance;
                p.x += (dx / distance) * overlap; p.y += (dy / distance) * overlap;
            }
        }

        function update() {
            if (isViewingSecurity) {
                if (keys['e'] || keys['escape']) {
                    isViewingSecurity = false;
                    joystickZone.style.display = 'flex';
                    keys['e'] = false; keys['escape'] = false;
                }
                return;
            }

            if (keys['w'] || keys['arrowup']) player.vy = -player.speed;
            else if (keys['s'] || keys['arrowdown']) player.vy = player.speed;
            else if (!joystickActive) player.vy = 0;

            if (keys['a'] || keys['arrowleft']) { player.vx = -player.speed; player.facingRight = false; }
            else if (keys['d'] || keys['arrowright']) { player.vx = player.speed; player.facingRight = true; }
            else if (!joystickActive) player.vx = 0;

            if (joystickActive && player.vx !== 0) player.facingRight = player.vx > 0;

            player.x += player.vx;
            player.y += player.vy;

            for (let line of wallLines) resolveLineCollision(player, line);
            for (let table of finalTables) resolveCircleCollision(player, table);
            resolveCircleCollision(player, { cx: gameConfig.securityScreen.cx, cy: gameConfig.securityScreen.cy, radius: gameConfig.securityScreen.radius });

            if (player.x < 0) player.x = 0; if (player.y < 0) player.y = 0;
            if (player.x > mapWidth) player.x = mapWidth; if (player.y > mapHeight) player.y = mapHeight;

            let distToSec = Math.sqrt((player.x - gameConfig.securityScreen.cx) ** 2 + (player.y - gameConfig.securityScreen.cy) ** 2);
            let currentlyNear = distToSec <= (player.radius + gameConfig.securityScreen.interactRange);
            
            if (currentlyNear !== nearSecurity) {
                nearSecurity = currentlyNear;
                updateButtonTexture(nearSecurity);
            }

            if (keys['e'] && nearSecurity) {
                isViewingSecurity = !isViewingSecurity;
                joystickZone.style.display = isViewingSecurity ? 'none' : 'flex';
                keys['e'] = false;
            }

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            camera.x = Math.max(0, Math.min(mapWidth - canvas.width, camera.x));
            camera.y = Math.max(0, Math.min(mapHeight - canvas.height, camera.y));
        }

        // Zeichnet das geometrisch exakte lila Viereck (Sicht-Trapez)
        function drawCameraVisionSquare(cam) {
            let leftAngle = cam.angle - cam.fov / 2;
            let rightAngle = cam.angle + cam.fov / 2;

            let farLeftX = cam.x + Math.cos(leftAngle) * cam.range;
            let farLeftY = cam.y + Math.sin(leftAngle) * cam.range;
            let farRightX = cam.x + Math.cos(rightAngle) * cam.range;
            let farRightY = cam.y + Math.sin(rightAngle) * cam.range;

            ctx.fillStyle = 'rgba(168, 85, 247, 0.15)'; 
            ctx.strokeStyle = 'rgba(168, 85, 247, 0.4)';
            ctx.lineWidth = 2;

            ctx.beginPath();
            ctx.moveTo(cam.x, cam.y);
            ctx.lineTo(farLeftX, farLeftY);
            ctx.lineTo(farRightX, farRightY);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Kamera-Kopf-Punkt
            ctx.fillStyle = '#a855f7';
            ctx.beginPath(); ctx.arc(cam.x, cam.y, 6, 0, Math.PI * 2); ctx.fill();
            
            // Markiert im Debug Mode die im Radio-Feld selektierte Cam visuell
            if (debugMode) {
                const activeTarget = document.querySelector('input[name="placement-target"]:checked')?.value;
                if (activeTarget && activeTarget.startsWith('cam-')) {
                    let activeIdx = parseInt(activeTarget.split('-')[1]);
                    if (gameConfig.cameras[activeIdx] === cam) {
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(cam.x - 10, cam.y - 10, 20, 20);
                    }
                }
            }
        }

        function isPointInVision(px, py, cam) {
            let dx = px - cam.x; let dy = py - cam.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > cam.range) return false;

            let angleToPoint = Math.atan2(dy, dx);
            let diff = Math.atan2(Math.sin(angleToPoint - cam.angle), Math.cos(angleToPoint - cam.angle));
            return Math.abs(diff) <= cam.fov / 2;
        }

        function drawSecurityMonitorSystem() {
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const padding = 20;
            const w = (canvas.width - padding * 3) / 2;
            const h = (canvas.height - padding * 3) / 2;

            const gridPositions = [
                { x: padding, y: padding }, { x: padding * 2 + w, y: padding },
                { x: padding, y: padding * 2 + h }, { x: padding * 2 + w, y: padding * 2 + h }
            ];

            gameConfig.cameras.forEach((cam, i) => {
                let pos = gridPositions[i];
                ctx.save();
                ctx.beginPath(); ctx.rect(pos.x, pos.y, w, h); ctx.clip();

                ctx.translate(pos.x + w / 2 - cam.x, pos.y + h / 2 - cam.y);

                if (textures.map && textures.map.complete) ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);

                drawCameraVisionSquare(cam);

                if (isPointInVision(player.x, player.y, cam)) {
                    ctx.save();
                    ctx.translate(player.x, player.y);
                    if (!player.facingRight) ctx.scale(-1, 1);
                    if (textures.player && textures.player.complete) {
                        ctx.drawImage(textures.player, -player.width/2, -player.height/2, player.width, player.height);
                    }
                    ctx.restore();
                }
                ctx.restore();

                ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3;
                ctx.strokeRect(pos.x, pos.y, w, h);

                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; ctx.fillRect(pos.x + 10, pos.y + 10, 145, 30);
                ctx.fillStyle = '#00ffcc'; ctx.font = 'bold 12px monospace';
                ctx.fillText(`CAM: ${cam.id}`, pos.x + 20, pos.y + 28);
            });

            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(canvas.width / 2 - 150, canvas.height - 50, 300, 40);
            ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('Tap USE Button to Exit Security', canvas.width / 2, canvas.height - 25);
            ctx.textAlign = 'left';
        }

        function draw() {
            if (isViewingSecurity) {
                drawSecurityMonitorSystem();
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            if (textures.map && textures.map.complete) {
                ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
            } else {
                ctx.fillStyle = '#1e1e24'; ctx.fillRect(0, 0, mapWidth, mapHeight);
            }

            gameConfig.cameras.forEach(cam => drawCameraVisionSquare(cam));

            // Terminal
            ctx.fillStyle = nearSecurity ? 'rgba(0, 255, 200, 0.4)' : 'rgba(59, 130, 246, 0.4)';
            ctx.strokeStyle = nearSecurity ? '#00ffcc' : '#3b82f6';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(gameConfig.securityScreen.cx, gameConfig.securityScreen.cy, gameConfig.securityScreen.radius, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();

            // Player
            ctx.save();
            ctx.translate(player.x, player.y);
            if (!player.facingRight) ctx.scale(-1, 1);
            if (textures.player && textures.player.complete) {
                ctx.drawImage(textures.player, -player.width / 2, -player.height / 2, player.width, player.height);
            } else {
                ctx.fillStyle = '#da2222'; ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
            }
            ctx.restore();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
