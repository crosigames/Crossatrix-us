// UI Modus wechseln
function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('#controls button').forEach(btn => btn.classList.remove('active'));
    if(mode === 'wall') document.getElementById('btn-wall').classList.add('active');
    if(mode === 'vent') document.getElementById('btn-vent').classList.add('active');
    if(mode === 'remove-vent') document.getElementById('btn-remove-vent').classList.add('active');
}

// Canvas neu zeichnen
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid zeichnen (optional, hilft bei der Orientierung)
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    for(let x = 0; x < canvas.width; x += 50) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for(let y = 0; y < canvas.height; y += 50) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    // Wände zeichnen
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    walls.forEach(wall => {
        ctx.beginPath();
        ctx.moveTo(wall.x1, wall.y1);
        ctx.lineTo(wall.x2, wall.y2);
        ctx.stroke();
    });

    // Vents zeichnen
    vents.forEach(vent => {
        ctx.fillStyle = '#00ffcc';
        ctx.strokeStyle = '#00b38f';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(vent.x, vent.y, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        
        // Kleines "V" Symbol im Kreis
        ctx.fillStyle = '#111';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('V', vent.x, vent.y);
    });
}

// --- HITBOX PRÄZISION (Vektorprojektion) ---
function isClickOnWall(cx, cy, wall, tolerance = 10) {
    const { x1, y1, x2, y2 } = wall;
    const l2 = Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2);
    if (l2 === 0) return false;

    // Projektionsfaktor t auf der Geraden berechnen
    let t = ((cx - x1) * (x2 - x1) + (cy - y1) * (y2 - y1)) / l2;
    t = Math.max(0, Math.min(1, t)); // Begrenzung auf das Liniensegment

    // Koordinaten des nahesten Punktes auf dem Segment
    const px = x1 + t * (x2 - x1);
    const py = y1 + t * (y2 - y1);

    // Distanz berechnen
    const dist = Math.sqrt(Math.pow(cx - px, 2) + Math.pow(cy - py, 2));
    return dist < tolerance;
}

// Click-Handler auf dem Canvas
canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    // Skalierung beachten, falls das Canvas via CSS gestaucht/gestreckt wird
    const x = Math.round((e.clientX - rect.left) * (canvas.width / rect.width));
    const y = Math.round((e.clientY - rect.top) * (canvas.height / rect.height));

    if (currentMode === 'wall') {
        // Wand entfernen
        const initialLength = walls.length;
        walls = walls.filter(wall => !isClickOnWall(x, y, wall));
        if(walls.length < initialLength) draw();
    } 
    else if (currentMode === 'vent') {
        // Vent hinzufügen
        vents.push({ x: x, y: y });
        draw();
    } 
    else if (currentMode === 'remove-vent') {
        // Vent entfernen (Radius Kollision)
        const clickRadius = 20;
        const initialLength = vents.length;
        vents = vents.filter(vent => {
            const dist = Math.sqrt(Math.pow(vent.x - x, 2) + Math.pow(vent.y - y, 2));
            return dist > clickRadius;
        });
        if(vents.length < initialLength) draw();
    }
});

// JSON Export & Clipboard
function copyVentsJSON() {
    const jsonString = JSON.stringify(vents, null, 2);
    navigator.clipboard.writeText(jsonString)
        .then(() => {
            alert(`JSON erfolgreich kopiert!\n\n${vents.length} Vents exportiert.`);
        })
        .catch(err => {
            console.error('Fehler beim Kopieren in die Zwischenablage:', err);
            // Fallback, falls Clipboard API fehlschlägt
            alert("Fehler beim direkten Kopieren. JSON wurde in der Console ausgegeben.");
            console.log(jsonString);
        });
}

// Initialer Render
draw();
</script>
