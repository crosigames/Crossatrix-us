<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us Clone - Hitbox Calibrator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        /* Kalibrierungs-Panel */
        #calibrator-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 100;
            border: 1px solid #555;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .control-group {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .control-group span {
            min-width: 90px;
            display: inline-block;
            font-weight: bold;
        }
        button {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        button:active {
            background: #666;
        }
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 10;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 80px;
            height: 80px;
            background: rgba(180, 180, 180, 0.4);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="calibrator-panel">
        <div style="font-weight: bold; margin-bottom: 8px; color: #00ffcc;">Hitbox Verschiebung:</div>
        <div class="control-group">
            <span id="val-x">X-Offset: 0</span>
            <button onclick="adjustOffset('x', -10)">-10</button>
            <button onclick="adjustOffset('x', -1)">-1</button>
            <button onclick="adjustOffset('x', 1)">+1</button>
            <button onclick="adjustOffset('x', 10)">+10</button>
        </div>
        <div class="control-group">
            <span id="val-y">Y-Offset: 0</span>
            <button onclick="adjustOffset('y', -10)">-10</button>
            <button onclick="adjustOffset('y', -1)">-1</button>
            <button onclick="adjustOffset('y', 1)">+1</button>
            <button onclick="adjustOffset('y', 10)">+10</button>
        </div>
        <div style="font-size: 10px; color: #aaa; margin-top: 5px;">Bewege die Boxen bis sie auf der Map passen!</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>
    
    <div id="action-btn">USE</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const mapWidth = 1920;
        const mapHeight = 1080;

        // Dynamische Offsets, die du über das Panel veränderst
        let offsetX = 0;
        let offsetY = 0;

        function adjustOffset(axis, amount) {
            if (axis === 'x') offsetX += amount;
            if (axis === 'y') offsetY += amount;
            document.getElementById('val-x').innerText = `X-Offset: ${offsetX}`;
            document.getElementById('val-y').innerText = `Y-Offset: ${offsetY}`;
        }

        const textures = {};
        const sources = {
            map: 'assets/Map.png',
            player: 'assets/IMG_0964.webp'
        };
        
        let loadedCount = 0;
        const totalSources = Object.keys(sources).length;

        for (let key in sources) {
            textures[key] = new Image();
            textures[key].src = sources[key];
            textures[key].onload = () => { loadedCount++; };
            textures[key].onerror = () => { loadedCount++; };
        }

        // Basis-Koordinaten aus dem letzten Versuch
        const baseHitboxes = [
            { x: 815,  y: 40,  width: 40,  height: 95 },
            { x: 815,  y: 40,  width: 250, height: 40 },
            { x: 1055, y: 40,  width: 250, height: 40 },
            { x: 1265, y: 40,  width: 40,  height: 95 },
            { x: 648,  y: 135, width: 45,  height: 300 },
            { x: 1428, y: 135, width: 45,  height: 300 },
            { x: 648,  y: 435, width: 230, height: 45 },
            { x: 835,  y: 480, width: 45,  height: 60 },
            { x: 1243, y: 435, width: 230, height: 45 },
            { x: 1243, y: 480, width: 45,  height: 60 },
            { x: 835,  y: 540, width: 140, height: 45 },
            { x: 1145, y: 540, width: 143, height: 45 },
            { x: 975,  y: 585, width: 15,  height: 300 },
            { x: 1132, y: 585, width: 15,  height: 300 }
        ];

        const baseCircleHitboxes = [
            { cx: 917,  cy: 218, radius: 52 },
            { cx: 1208, cy: 218, radius: 52 },
            { cx: 1062, cy: 354, radius: 52 },
            { cx: 917,  cy: 491, radius: 52 },
            { cx: 1208, cy: 491, radius: 52 }
        ];

        // Spieler startet im Zentrum des Screens
        let player = {
            x: 930, 
            y: 330,  
            width: 42,  
            height: 54, 
            speed: 5,
            vx: 0,
            vy: 0,
            facingRight: true
        };

        let camera = { x: 0, y: 0 };
        const keys = {};

        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickStartX = 0;
        let joystickStartY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        joystickZone.addEventListener('touchstart', e => {
            joystickActive = true;
            const rect = joystickZone.getBoundingClientRect();
            joystickStartX = rect.left + rect.width / 2;
            joystickStartY = rect.top + rect.height / 2;
        });

        window.addEventListener('touchmove', e => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystickStartX;
            let dy = touch.clientY - joystickStartY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 40;

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            player.vx = (dx / maxRadius) * player.speed;
            player.vy = (dy / maxRadius) * player.speed;
        });

        window.addEventListener('touchend', () => {
            joystickActive = false;
            joystickKnob.style.transform = 'translate(0px, 0px)';
            player.vx = 0;
            player.vy = 0;
        });

        function checkRectCollision(rect1, rect2) {
            // Berechne reale Position der Hitbox inklusive des Live-Offsets ein
            return rect1.x < rect2.x + offsetX + rect2.width &&
                   rect1.x + rect1.width > rect2.x + offsetX &&
                   rect1.y < rect2.y + offsetY + rect2.height &&
                   rect1.y + rect1.height > rect2.y + offsetY;
        }

        function resolveCircleCollision(playerObj, circle) {
            // Berechne reale Position des Kreises inklusive des Live-Offsets ein
            let currentCX = circle.cx + offsetX;
            let currentCY = circle.cy + offsetY;

            let closestX = Math.max(playerObj.x, Math.min(currentCX, playerObj.x + playerObj.width));
            let closestY = Math.max(playerObj.y, Math.min(currentCY, playerObj.y + playerObj.height));

            let distanceX = currentCX - closestX;
            let distanceY = currentCY - closestY;
            let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

            if (distanceSquared < circle.radius * circle.radius) {
                let distance = Math.sqrt(distanceSquared);
                if (distance === 0) return;

                let overlap = circle.radius - distance;
                let dirX = distanceX / distance;
                let dirY = distanceY / distance;

                playerObj.x -= dirX * overlap;
                playerObj.y -= dirY * overlap;
            }
        }

        function update() {
            if (keys['w'] || keys['arrowup']) player.vy = -player.speed;
            else if (keys['s'] || keys['arrowdown']) player.vy = player.speed;
            else if (!joystickActive) player.vy = 0;

            if (keys['a'] || keys['arrowleft']) { player.vx = -player.speed; player.facingRight = false; }
            else if (keys['d'] || keys['arrowright']) { player.vx = player.speed; player.facingRight = true; }
            else if (!joystickActive) player.vx = 0;

            if (joystickActive && player.vx !== 0) {
                player.facingRight = player.vx > 0;
            }

            // X Kollision
            player.x += player.vx;
            for (let box of baseHitboxes) {
                if (checkRectCollision(player, box)) {
                    if (player.vx > 0) player.x = box.x + offsetX - player.width;
                    if (player.vx < 0) player.x = box.x + offsetX + box.width;
                }
            }

            // Y Kollision
            player.y += player.vy;
            for (let box of baseHitboxes) {
                if (checkRectCollision(player, box)) {
                    if (player.vy > 0) player.y = box.y + offsetY - player.height;
                    if (player.vy < 0) player.y = box.y + offsetY + box.height;
                }
            }

            // Kreis Kollision
            for (let circle of baseCircleHitboxes) {
                resolveCircleCollision(player, circle);
            }

            // Starre Kamera zentriert auf die 1920x1080 Map
            camera.x = (mapWidth - canvas.width) / 2;
            camera.y = (mapHeight - canvas.height) / 2;
            if (camera.x < 0) camera.x = 0;
            if (camera.y < 0) camera.y = 0;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Map
            if (textures.map && textures.map.complete && textures.map.naturalWidth !== 0) {
                ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
            } else {
                ctx.fillStyle = '#1e1e24';
                ctx.fillRect(0, 0, mapWidth, mapHeight);
            }

            // Rote Debug-Layer inklusive des Live-Offsets gezeichnet
            ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
            for (let box of baseHitboxes) {
                ctx.fillRect(box.x + offsetX, box.y + offsetY, box.width, box.height);
            }
            for (let circle of baseCircleHitboxes) {
                ctx.beginPath();
                ctx.arc(circle.cx + offsetX, circle.cy + offsetY, circle.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            // Spieler
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
            if (!player.facingRight) ctx.scale(-1, 1);

            if (textures.player && textures.player.complete && textures.player.naturalWidth !== 0) {
                ctx.drawImage(textures.player, -player.width / 2, -player.height / 2, player.width, player.height);
            } else {
                ctx.fillStyle = '#da2222';
                ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
            }
            ctx.restore();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
