<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us Clone - Mobile Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 10;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 90px;
            height: 90px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            touch-action: none;
            z-index: 10;
            display: block;
        }
        #engineer-btn {
            position: absolute;
            bottom: 155px;
            right: 50px;
            width: 90px;
            height: 90px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            touch-action: none;
            z-index: 10;
            display: none;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        
        #role-selection-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 8, 0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .window-title {
            font-size: 24px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-family: monospace;
        }
        .role-buttons {
            display: flex;
            gap: 15px;
            flex-direction: row;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        .panel-btn {
            background: #1e1e24;
            color: #fff;
            border: 2px solid #3b82f6;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            border-radius: 8px;
            cursor: pointer;
        }
        .panel-btn:active {
            background: #3b82f6;
            color: #000;
        }
        #btn-engineer { border-color: #a855f7; }
        #btn-engineer:active { background: #a855f7; color: #000; }
    </style>
</head>
<body>

    <div id="role-selection-overlay">
        <h1 class="window-title">WÄHLE DEINE ROLLE</h1>
        <div class="role-buttons">
            <button class="panel-btn" id="btn-crewmate" onclick="selectRole('crewmate')">CREWMATE</button>
            <button class="panel-btn" id="btn-engineer" onclick="selectRole('engineer')">ENGINEER</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>
    
    <div id="action-btn"></div>
    <div id="engineer-btn"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const mapWidth = 1920;
        const mapHeight = 1080;
        const wallThickness = 15;

        let playerRole = null;
        let gameActive = false;
        
        // debugMode auf false setzen, damit die kreisrunden Hitboxen unsichtbar bleiben

        // Fest platzierte Vents aus deiner Konfiguration
        let vents = [

            { "x1": 668,  "y1": 486, "x2": 662,  "y2": 300 }, { "x1": 663,  "y1": 293, "x2": 714,  "y2": 291 },
            { "x1": 717,  "y1": 290, "x2": 716,  "y2": 276 }, { "x1": 716,  "y1": 272, "x2": 529,  "y2": 277 },
            { "x1": 535,  "y1": 274, "x2": 522,  "y2": 164 }, { "x1": 521,  "y1": 350, "x2": 473,  "y2": 353 },
            { "x1": 471,  "y1": 356, "x2": 469,  "y2": 477 }, { "x1": 472,  "y1": 479, "x2": 522,  "y2": 476 },
            { "x1": 523,  "y1": 480, "x2": 523,  "y2": 406 }, { "x1": 524,  "y1": 436, "x2": 566,  "y2": 391 },
            { "x1": 566,  "y1": 390, "x2": 601,  "y2": 391 }, { "x1": 608,  "y1": 395, "x2": 634,  "y2": 419 },
            { "x1": 639,  "y1": 422, "x2": 645,  "y2": 576 }, { "x1": 636,  "y1": 580, "x2": 538,  "y2": 584 },
            { "x1": 532,  "y1": 585, "x2": 527,  "y2": 532 }, { "x1": 527,  "y1": 531, "x2": 474,  "y2": 531 },
            { "x1": 473,  "y1": 536, "x2": 470,  "y2": 634 }, { "x1": 473,  "y1": 634, "x2": 471,  "y2": 664 },
            { "x1": 472,  "y1": 664, "x2": 516,  "y2": 666 }, { "x1": 518,  "y1": 665, "x2": 524,  "y2": 735 },
            { "x1": 530,  "y1": 729, "x2": 658,  "y2": 733 }, { "x1": 662,  "y1": 738, "x2": 663,  "y2": 844 },
            { "x1": 663,  "y1": 845, "x2": 704,  "y2": 849 }, { "x1": 705,  "y1": 850, "x2": 704,  "y2": 813 },
            { "x1": 703,  "y1": 817, "x2": 695,  "y2": 566 }, { "x1": 810,  "y1": 696, "x2": 705,  "y2": 692 },
            { "x1": 809,  "y1": 696, "x2": 807,  "y2": 668 }, { "x1": 807,  "y1": 669, "x2": 706,  "y2": 671 },
            { "x1": 704,  "y1": 588, "x2": 760,  "y2": 584 }, { "x1": 762,  "y1": 585, "x2": 766,  "y2": 599 },
            { "x1": 768,  "y1": 603, "x2": 907,  "y2": 600 }, { "x1": 911,  "y1": 602, "x2": 910,  "y2": 610 },
            { "x1": 913,  "y1": 613, "x2": 865,  "y2": 663 }, { "x1": 862,  "y1": 662, "x2": 862,  "y2": 744 },
            { "x1": 861,  "y1": 747, "x2": 824,  "y2": 790 }, { "x1": 825,  "y1": 792, "x2": 768,  "y2": 795 },
            { "x1": 770,  "y1": 794, "x2": 766,  "y2": 851 }, { "x1": 769,  "y1": 853, "x2": 904,  "y2": 850 },
            { "x1": 904,  "y1": 845, "x2": 901,  "y2": 684 }, { "x1": 904,  "y1": 678, "x2": 902,  "y2": 706 },
            { "x1": 913,  "y1": 727, "x2": 1005, "y2": 646 }, { "x1": 1013, "y1": 645, "x2": 1058, "y2": 649 },
            { "x1": 1059, "y1": 644, "x2": 1059, "y2": 475 }, { "x1": 62,   "y1": 930, "x2": 34,   "y2": 916 }
        ];

        // Tische (Kollisionsobjekte)
        const pivotX = 997, pivotY = 272;
        const finalTables = [
            { cx: pivotX - (1062 - pivotX) * 0.71 - 20, cy: pivotY + (354 - pivotY) * 0.77 - 110, rx: 52 * 0.82, ry: 80 * 0.82 },
            { cx: pivotX,                               cy: pivotY,                              rx: 57,        ry: 89        },
            { cx: pivotX + (1062 - pivotX) * 0.71 + 20, cy: pivotY + (354 - pivotY) * 0.77 - 110, rx: 52 * 0.82, ry: 80 * 0.82 }
        ];

        // Startposition angepasst auf einen sicheren, freien Bereich in der Cafeteria
        let player = {
            x: 1060,
            y: 150,
            width: 40,
            height: 40,
            speed: 3.5,
            facingRight: true
        };

        let camera = { x: 0, y: 0 };
        let joystick = { active: false, startX: 0, startY: 0, curX: 0, curY: 0, moveX: 0, moveY: 0 };

        let textures = { map: new Image(), player: new Image() };
        textures.map.src = 'assets/Map.png';
        textures.player.src = 'assets/Player.png';

        let uiImages = { use: new Image(), vent: new Image(), report: new Image(), arrowLeft: new Image(), arrowRight: new Image() };
        uiImages.use.src = 'assets/Use.png';
        uiImages.vent.src = 'assets/Vent.png';
        uiImages.report.src = 'assets/Report.png';
        uiImages.arrowLeft.src = 'assets/ArrowLeft.png';
        uiImages.arrowRight.src = 'assets/ArrowRight.png';

        let activeInteractObject = null;
        let activeInteractType = null; 
        let isViewingSecurity = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (gameActive) updateCamera();
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('load', resizeCanvas);

        function selectRole(role) {
            playerRole = role;
            document.getElementById('role-selection-overlay').style.display = 'none';
            gameActive = true;
            resizeCanvas();
            requestAnimationFrame(gameLoop);
        }

        // Joystick-Steuerung
        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');

        joystickZone.addEventListener('touchstart', (e) => {
            if (isViewingSecurity) return;
            const touch = e.touches[0];
            joystick.active = true;
            joystick.startX = touch.clientX;
            joystick.startY = touch.clientY;
            joystick.curX = touch.clientX;
            joystick.curY = touch.clientY;
        });

        joystickZone.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            const touch = e.touches[0];
            joystick.curX = touch.clientX;
            joystick.curY = touch.clientY;

            let dx = joystick.curX - joystick.startX;
            let dy = joystick.curY - joystick.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 40;

            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }

            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            joystick.moveX = dx / maxDist;
            joystick.moveY = dy / maxDist;
        });

        function resetJoystick() {
            joystick.active = false;
            joystick.moveX = 0;
            joystick.moveY = 0;
            joystickKnob.style.transform = 'translate(0px, 0px)';
        }
        joystickZone.addEventListener('touchend', resetJoystick);
        joystickZone.addEventListener('touchcancel', resetJoystick);

        // Interaktions-Buttons
        const actionBtn = document.getElementById('action-btn');
        const engineerBtn = document.getElementById('engineer-btn');

        actionBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handlePrimaryInteraction();
        });

        engineerBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleEngineerInteraction();
        });

        function handlePrimaryInteraction() {
            if (isViewingSecurity) {
                isViewingSecurity = false;
                return;
            }
            if (activeInteractObject && activeInteractType === 'security') {
                isViewingSecurity = true;
                resetJoystick();
            }
        }

        function handleEngineerInteraction() {
            if (playerRole !== 'engineer') return;

            if (isVenting) {
                isVenting = false;
                player.x = currentVentNode.x;
                player.y = currentVentNode.y;
                currentVentNode = null;
            } else {
                let closeVent = null;
                let minDist = 60;
                vents.forEach(v => {
                    let d = Math.sqrt((player.x - v.x)**2 + (player.y - v.y)**2);
                    if (d < minDist) { minDist = d; closeVent = v; }
                });
                if (closeVent) {
                    isVenting = true;
                    currentVentNode = closeVent;
                }
            }
        }

        function checkInteractions() {
            if (isVenting) {
                activeInteractObject = null;
                activeInteractType = null;
                return;
            }
            let sec = gameConfig.securityScreen;
            let dSec = Math.sqrt((player.x - sec.cx)**2 + (player.y - sec.cy)**2);
            if (dSec < sec.interactRange) {
                activeInteractObject = sec;
                activeInteractType = 'security';
                return;
            }
            activeInteractObject = null;
            activeInteractType = null;
        }

        function updateInteractButtonsUI() {
            if (isViewingSecurity) {
                actionBtn.style.backgroundImage = `url(${uiImages.arrowLeft.src})`;
                actionBtn.style.opacity = "1";
                engineerBtn.style.display = "none";
                return;
            }

            if (activeInteractType === 'security') {
                actionBtn.style.backgroundImage = `url(${uiImages.use.src})`;
                actionBtn.style.opacity = "1";
            } else {
                actionBtn.style.backgroundImage = `url(${uiImages.use.src})`;
                actionBtn.style.opacity = "0.4";
            }

            if (playerRole === 'engineer') {
                engineerBtn.style.display = "block";
                let nearVent = false;
                vents.forEach(v => {
                    let d = Math.sqrt((player.x - v.x)**2 + (player.y - v.y)**2);
                    if (d < 60) nearVent = true;
                });
                if (nearVent || isVenting) {
                    engineerBtn.style.opacity = "1";
                } else {
                    engineerBtn.style.opacity = "0.4";
                }
            } else {
                engineerBtn.style.display = "none";
            }
        }

        function getVentNeighbors(vent) {
            return vents.filter(v => v.id === vent.id && v !== vent);
        }

        function updateVentNavigationMovement() {
            if (!isVenting || !currentVentNode) return;
            let neighbors = getVentNeighbors(currentVentNode);
            if (neighbors.length === 0) return;

            let mX = joystick.moveX;
            let mY = joystick.moveY;
            let mag = Math.sqrt(mX*mX + mY*mY);
            if (mag > 0.5) {
                let dirX = mX / mag;
                let dirY = mY / mag;
                let bestNode = null;
                let maxDot = 0.7; 

                neighbors.forEach(n => {
                    let nX = n.x - currentVentNode.x;
                    let nY = n.y - currentVentNode.y;
                    let nMag = Math.sqrt(nX*nX + nY*nY);
                    if (nMag > 0) {
                        let dot = (nX/nMag)*dirX + (nY/nMag)*dirY;
                        if (dot > maxDot) { maxDot = dot; bestNode = n; }
                    }
                });
                if (bestNode) {
                    currentVentNode = bestNode;
                    resetJoystick();
                }
            }
        }

        // Kollisionsprüfung für Wände und Ellipsen-Tische
        function isPointInWall(x, y) {
            for (let i = 0; i < wallLines.length; i++) {
                let w = wallLines[i];
                let dist = pDistance(x, y, w.x1, w.y1, w.x2, w.y2);
                if (dist < wallThickness) return true;
            }
            for (let i = 0; i < finalTables.length; i++) {
                let t = finalTables[i];
                let dx = x - t.cx;
                let dy = y - t.cy;
                if ((dx*dx)/(t.rx*t.rx) + (dy*dy)/(t.ry*t.ry) <= 1) return true;
            }
            return false;
        }

        function pDistance(x, y, x1, y1, x2, y2) {
            let A = x - x1; let B = y - y1; let C = x2 - x1; let D = y2 - y1;
            let dot = A * C + B * D; let len_sq = C * C + D * D;
            let param = -1;
            if (len_sq !== 0) param = dot / len_sq;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            let dx = x - xx; let dy = y - yy;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function movePlayer() {
            if (!joystick.active || isVenting || isViewingSecurity) return;

            let dx = joystick.moveX * player.speed;
            let dy = joystick.moveY * player.speed;

            if (dx > 0) player.facingRight = true;
            if (dx < 0) player.facingRight = false;

            let newX = player.x + dx;
            let newY = player.y + dy;

            // X-Richtung bewegen mit Slide-Effekt an Wänden
            if (!isPointInWall(newX, player.y)) {
                player.x = newX;
            } else {
                let step = dx > 0 ? 1 : -1;
                while (Math.abs(step) <= Math.abs(dx)) {
                    if (!isPointInWall(player.x + step, player.y)) player.x += step;
                    else break;
                    step += dx > 0 ? 1 : -1;
                }
            }

            // Y-Richtung bewegen
            if (!isPointInWall(player.x, newY)) {
                player.y = newY;
            } else {
                let step = dy > 0 ? 1 : -1;
                while (Math.abs(step) <= Math.abs(dy)) {
                    if (!isPointInWall(player.x, player.y + step)) player.y += step;
                    else break;
                    step += dy > 0 ? 1 : -1;
                }
            }

            // Mapgrenzen einhalten
            if (player.x < 0) player.x = 0; if (player.x > mapWidth) player.x = mapWidth;
            if (player.y < 0) player.y = 0; if (player.y > mapHeight) player.y = mapHeight;
        }

        function updateCamera() {
            if (isViewingSecurity) return; 
            if (isVenting && currentVentNode) {
                camera.x = currentVentNode.x - canvas.width / 2;
                camera.y = currentVentNode.y - canvas.height / 2;
            } else {
                camera.x = player.x - canvas.width / 2;
                camera.y = player.y - canvas.height / 2;
            }
            if (camera.x < 0) camera.x = 0; if (camera.x > mapWidth - canvas.width) camera.x = mapWidth - canvas.width;
            if (camera.y < 0) camera.y = 0; if (camera.y > mapHeight - canvas.height) camera.y = mapHeight - canvas.height;
            if (mapWidth < canvas.width) camera.x = (mapWidth - canvas.width) / 2;
            if (mapHeight < canvas.height) camera.y = (mapHeight - canvas.height) / 2;
        }

        function drawVents() {
            // debugMode ist false, daher wird hier im Spiel nichts mehr gezeichnet.
            // Falls du sie im Dev-Modus sehen willst, setze oben debugMode = true;
            if (debugMode) {
                vents.forEach(vent => {
                    ctx.beginPath();
                    ctx.arc(vent.x - camera.x, vent.y - camera.y, vent.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(168, 85, 247, 0.6)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.fillStyle = '#a855f7';
                    ctx.font = '10px monospace';
                    ctx.fillText(`ID: ${vent.id}`, vent.x - camera.x - 12, vent.y - camera.y - vent.radius - 4);
                });
            }
        }

        function drawSecurityInteractZone() {
            let sec = gameConfig.securityScreen;
            if (debugMode) {
                ctx.beginPath();
                ctx.arc(sec.cx - camera.x, sec.cy - camera.y, sec.radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(59, 130, 246, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function isPointInVision(px, py, cam) {
            let dx = px - cam.x; let dy = py - cam.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > cam.range) return false;
            let angleToPlayer = Math.atan2(dy, dx);
            let diff = angleToPlayer - cam.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            return Math.abs(diff) <= cam.fov / 2;
        }

        function drawCameraVisionSquare(cam) {
            ctx.beginPath(); ctx.moveTo(cam.x - camera.x, cam.y - camera.y);
            let leftAngle = cam.angle - cam.fov / 2;
            let rightAngle = cam.angle + cam.fov / 2;
            ctx.lineTo(cam.x - camera.x + Math.cos(leftAngle)*cam.range, cam.y - camera.y + Math.sin(leftAngle)*cam.range);
            ctx.arc(cam.x - camera.x, cam.y - camera.y, cam.range, leftAngle, rightAngle);
            ctx.lineTo(cam.x - camera.x, cam.y - camera.y);
            ctx.fillStyle = 'rgba(0, 255, 200, 0.08)'; ctx.fill();
            ctx.strokeStyle = 'rgba(0, 255, 200, 0.3)'; ctx.lineWidth = 1; ctx.stroke();
        }

        function drawSecurityView() {
            ctx.fillStyle = '#050508'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            let cams = gameConfig.cameras;
            let gap = 15;
            let topBarHeight = 50;
            let w = (canvas.width - gap * 3) / 2;
            let h = (canvas.height - topBarHeight - gap * 3) / 2;

            ctx.fillStyle = '#111116'; ctx.fillRect(0, 0, canvas.width, topBarHeight);
            ctx.fillStyle = '#ef4444'; ctx.font = 'bold 16px monospace'; ctx.fillText("LIVE SECURITY MONITOR", 20, 32);

            cams.forEach((cam, idx) => {
                let col = idx % 2; let row = Math.floor(idx / 2);
                let posX = gap + col * (w + gap); let posY = topBarHeight + gap + row * (h + gap);
                ctx.save();
                ctx.beginPath(); ctx.rect(posX, posY, w, h); ctx.clip();
                ctx.fillStyle = '#0b0b0e'; ctx.fillRect(posX, posY, w, h);

                ctx.save();
                ctx.translate(posX + w / 2 - cam.x, posY + h / 2 - cam.y);
                if (textures.map && textures.map.complete) ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
                drawCameraVisionSquare(cam);
                
                if (!isVenting && isPointInVision(player.x, player.y, cam)) {
                    ctx.save(); ctx.translate(player.x, player.y); if (!player.facingRight) ctx.scale(-1, 1);
                    if (textures.player && textures.player.complete) ctx.drawImage(textures.player, -player.width/2, -player.height/2, player.width, player.height);
                    ctx.restore();
                }
                ctx.restore();
                ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3; ctx.strokeRect(pos.x, pos.y, w, h); // Hinweis: pos.x / pos.y Definition korrigiert im render-loop unten
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; ctx.fillRect(posX + 10, posY + 10, 185, 30);
                ctx.fillStyle = '#00ffcc'; ctx.font = 'bold 11px monospace'; ctx.fillText(`CAM: ${cam.id}`, posX + 15, posY + 28);
                ctx.restore();
            });
        }

        function gameLoop() {
            if (!gameActive) return;

            // Updates
            movePlayer();
            updateVentNavigationMovement();
            checkInteractions();
            updateCamera();
            updateInteractButtonsUI();

            // Zeichnen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (isViewingSecurity) {
                drawSecurityView();
            } else {
                // Spielwelt zeichnen
                ctx.save();
                ctx.translate(-camera.x, -camera.y);

                if (textures.map && textures.map.complete) {
                    ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
                } else {
                    ctx.fillStyle = '#1e1e24'; ctx.fillRect(0, 0, mapWidth, mapHeight);
                }

                drawSecurityInteractZone();
                drawVents();

                // Spieler zeichnen, außer er befindet sich im Vent
                if (!isVenting) {
                    ctx.save();
                    ctx.translate(player.x, player.y);
                    if (!player.facingRight) ctx.scale(-1, 1);
                    if (textures.player && textures.player.complete) {
                        ctx.drawImage(textures.player, -player.width / 2, -player.height / 2, player.width, player.height);
                    } else {
                        ctx.fillStyle = '#ef4444'; ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
                    }
                    ctx.restore();
                } else if (isVenting && currentVentNode) {
                    // Visueller Indikator im Vent im Dev-Modus
                    if (debugMode) {
                        ctx.fillStyle = 'rgba(168, 85, 247, 0.4)';
                        ctx.beginPath(); ctx.arc(currentVentNode.x, currentVentNode.y, player.width / 2, 0, Math.PI * 2); ctx.fill();
                    }
                }
                ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
