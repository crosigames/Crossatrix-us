<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us Clone</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        /* Mobile Touch Controls */
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transition: transform 0.05s linear;
        }
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 80px;
            height: 80px;
            background: rgba(180, 180, 180, 0.4);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        #action-btn.active {
            background: rgba(240, 190, 20, 0.8);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>
    
    <div id="action-btn">USE</div>

    <script>
        // ==========================================
        // TEXTURE CONFIGURATION
        // ==========================================
        const TEXTURE_PATHS = {
            map: 'assets/Map.png',
            player: 'assets/IMG_0964.webp'
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const textures = {};
        let texturesLoaded = 0;
        const totalTextures = Object.keys(TEXTURE_PATHS).length;

        // Koordinatensystem angepasst an die hochauflösende Widescreen-Map
        const mapWidth = 2560;
        const mapHeight = 1440;

        // ==========================================
        // COLLISION DATA (Präzise re-kalibriert)
        // ==========================================
        
        // Rechteckige Wände für die Cafeteria-Umgebung
        const hitboxes = [
            // Außenränder der Map
            { x: 0, y: 0, width: 2560, height: 40 },                  
            { x: 0, y: 1400, width: 2560, height: 40 },    
            { x: 0, y: 0, width: 40, height: 1440 },                  
            { x: 2520, y: 0, width: 40, height: 1440 },    

            // Cafeteria Raumstrukturen (Zentriert um X: 1350)
            { x: 1130, y: 40,  width: 440, height: 50 },   // Flache Oberkante
            { x: 980,  y: 80,  width: 150, height: 150 },  // Schräge Wand links oben
            { x: 1570, y: 80,  width: 150, height: 150 },  // Schräge Wand rechts oben
            { x: 980,  y: 230, width: 40,  height: 250 },  // Gerade Wand links
            { x: 1720, y: 230, width: 40,  height: 250 },  // Gerade Wand rechts
            { x: 980,  y: 480, width: 200, height: 100 },  // Schräge unten links
            { x: 1520, y: 480, width: 240, height: 100 },  // Schräge unten rechts
            
            // Unterer Ausgang / Flur-Wände
            { x: 1180, y: 580, width: 110, height: 40 },   // Untere Wand links vom Ausgang
            { x: 1410, y: 580, width: 110, height: 40 },   // Untere Wand rechts vom Ausgang
            { x: 1280, y: 620, width: 20,  height: 400 },  // Linke Flurwand
            { x: 1400, y: 620, width: 20,  height: 400 }   // Rechte Flurwand
        ];

        // Runde Hitboxen (Exakt deckungsgleich mit den 5 Tischen der neuen Map)
        const circleHitboxes = [
            { cx: 1170, cy: 160, radius: 55 }, // Tisch oben links
            { cx: 1530, cy: 160, radius: 55 }, // Tisch oben rechts
            { cx: 1350, cy: 300, radius: 55 }, // Tisch Mitte
            { cx: 1170, cy: 440, radius: 55 }, // Tisch unten links
            { cx: 1530, cy: 440, radius: 55 }  // Tisch unten rechts
        ];

        // Spieler-Setup
        let player = {
            x: 1320, 
            y: 370, // Spawnt jetzt direkt in der Cafeteria unter dem mittleren Tisch
            width: 55,  
            height: 70, 
            speed: 6,
            vx: 0,
            vy: 0,
            facingRight: true
        };

        let camera = { x: 0, y: 0 };
        const keys = {};

        // Touch-Steuerung
        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickStartX = 0;
        let joystickStartY = 0;

        function loadTextures() {
            for (let key in TEXTURE_PATHS) {
                textures[key] = new Image();
                textures[key].src = TEXTURE_PATHS[key];
                textures[key].onload = () => {
                    texturesLoaded++;
                    if (texturesLoaded === totalTextures) initGame();
                };
                textures[key].onerror = () => {
                    console.warn(`Fehler beim Laden von: ${TEXTURE_PATHS[key]}`);
                    texturesLoaded++;
                    if (texturesLoaded === totalTextures) initGame();
                };
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.imageSmoothingEnabled = true;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // Joystick Event-Handling
        joystickZone.addEventListener('touchstart', e => {
            joystickActive = true;
            const rect = joystickZone.getBoundingClientRect();
            joystickStartX = rect.left + rect.width / 2;
            joystickStartY = rect.top + rect.height / 2;
        });

        window.addEventListener('touchmove', e => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystickStartX;
            let dy = touch.clientY - joystickStartY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 40;

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            player.vx = (dx / maxRadius) * player.speed;
            player.vy = (dy / maxRadius) * player.speed;
        });

        window.addEventListener('touchend', () => {
            joystickActive = false;
            joystickKnob.style.transform = 'translate(0px, 0px)';
            player.vx = 0;
            player.vy = 0;
        });

        document.getElementById('action-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
        });

        function checkRectCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function resolveCircleCollision(playerObj, circle) {
            let closestX = Math.max(playerObj.x, Math.min(circle.cx, playerObj.x + playerObj.width));
            let closestY = Math.max(playerObj.y, Math.min(circle.cy, playerObj.y + playerObj.height));

            let distanceX = circle.cx - closestX;
            let distanceY = circle.cy - closestY;
            let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

            if (distanceSquared < circle.radius * circle.radius) {
                let distance = Math.sqrt(distanceSquared);
                if (distance === 0) return;

                let overlap = circle.radius - distance;
                let dirX = distanceX / distance;
                let dirY = distanceY / distance;

                playerObj.x -= dirX * overlap;
                playerObj.y -= dirY * overlap;
            }
        }

        function update() {
            if (keys['w'] || keys['arrowup']) player.vy = -player.speed;
            else if (keys['s'] || keys['arrowdown']) player.vy = player.speed;
            else if (!joystickActive) player.vy = 0;

            if (keys['a'] || keys['arrowleft']) { player.vx = -player.speed; player.facingRight = false; }
            else if (keys['d'] || keys['arrowright']) { player.vx = player.speed; player.facingRight = true; }
            else if (!joystickActive) player.vx = 0;

            if (joystickActive && player.vx !== 0) {
                player.facingRight = player.vx > 0;
            }

            // X-Achse
            player.x += player.vx;
            for (let box of hitboxes) {
                if (checkRectCollision(player, box)) {
                    if (player.vx > 0) player.x = box.x - player.width;
                    if (player.vx < 0) player.x = box.x + box.width;
                }
            }

            // Y-Achse
            player.y += player.vy;
            for (let box of hitboxes) {
                if (checkRectCollision(player, box)) {
                    if (player.vy > 0) player.y = box.y - player.height;
                    if (player.vy < 0) player.y = box.y + box.height;
                }
            }

            // Kreis-Kollision (Tische)
            for (let circle of circleHitboxes) {
                resolveCircleCollision(player, circle);
            }

            // Kamera-Fokus
            camera.x = player.x + player.width / 2 - canvas.width / 2;
            camera.y = player.y + player.height / 2 - canvas.height / 2;

            const maxCamX = mapWidth - canvas.width;
            const maxCamY = mapHeight - canvas.height;

            if (camera.x < 0) camera.x = 0;
            if (camera.y < 0) camera.y = 0;
            if (maxCamX > 0 && camera.x > maxCamX) camera.x = maxCamX;
            if (maxCamY > 0 && camera.y > maxCamY) camera.y = maxCamY;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // 1. Map zeichnen
            if (textures.map && textures.map.complete && textures.map.naturalWidth !== 0) {
                ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
            } else {
                ctx.fillStyle = '#1e1e24';
                ctx.fillRect(0, 0, mapWidth, mapHeight);
            }

            // --- HITBOX VISUALISIERUNG ---
            ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
            for (let box of hitboxes) {
                ctx.fillRect(box.x, box.y, box.width, box.height);
            }
            for (let circle of circleHitboxes) {
                ctx.beginPath();
                ctx.arc(circle.cx, circle.cy, circle.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            // 2. Spieler zeichnen
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
            
            if (!player.facingRight) ctx.scale(-1, 1);

            if (textures.player && textures.player.complete && textures.player.naturalWidth !== 0) {
                ctx.drawImage(textures.player, -player.width / 2, -player.height / 2, player.width, player.height);
            } else {
                ctx.fillStyle = '#da2222';
                ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
            }
            ctx.restore();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function initGame() {
            requestAnimationFrame(loop);
        }

        loadTextures();
    </script>
</body>
</html>
