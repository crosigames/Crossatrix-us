<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us Clone - Mobile Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        #debug-trigger-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(30, 30, 36, 0.7);
            color: #ef4444;
            border: 1.5px solid #ef4444;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: bold;
            font-family: monospace;
            border-radius: 4px;
            z-index: 50;
            cursor: pointer;
            letter-spacing: 1px;
        }
        #debug-trigger-btn:active {
            background: #ef4444;
            color: #000;
        }

        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 10;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 90px;
            height: 90px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            touch-action: none;
            z-index: 10;
            display: block;
        }
        #engineer-btn {
            position: absolute;
            bottom: 155px;
            right: 50px;
            width: 90px;
            height: 90px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            touch-action: none;
            z-index: 10;
            display: none;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        
        #role-selection-overlay, #debug-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 8, 0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        #debug-overlay {
            background: rgba(11, 11, 14, 0.95);
            display: none;
        }
        .window-title {
            font-size: 24px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-family: monospace;
        }
        .role-buttons, .debug-controls {
            display: flex;
            gap: 15px;
            flex-direction: row;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        .panel-btn {
            background: #1e1e24;
            color: #fff;
            border: 2px solid #3b82f6;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            border-radius: 8px;
            cursor: pointer;
        }
        .panel-btn:active {
            background: #3b82f6;
            color: #000;
        }
        #btn-engineer { border-color: #a855f7; }
        #btn-engineer:active { background: #a855f7; color: #000; }
        
        .debug-input {
            background: #16161a;
            border: 2px solid #4b5563;
            color: #fff;
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            width: 100px;
            text-align: center;
            font-family: monospace;
        }
        #debug-status-text {
            margin-top: 15px;
            font-family: monospace;
            font-size: 13px;
            color: #a855f7;
            font-weight: bold;
        }
    </style>
</head>

    <button id="debug-trigger-btn" onclick="toggleDebugMenu()">DEBUG</button>

    <div id="role-selection-overlay">
        <h1 class="window-title">WÄHLE DEINE ROLLE</h1>
        <div class="role-buttons">
            <button class="panel-btn" id="btn-crewmate" onclick="selectRole('crewmate')">CREWMATE</button>
            <button class="panel-btn" id="btn-engineer" onclick="selectRole('engineer')">ENGINEER</button>
        </div>
    </div>

    <div id="debug-overlay">
        <h1 class="window-title">DEBUG / VENT DEV MODE</h1>
        <div class="debug-controls">
            <input type="text" id="vent-id" class="debug-input" placeholder="ID (z.B. 1)" value="1">
            <input type="number" id="vent-size" class="debug-input" placeholder="Radius" value="25">
            <button class="panel-btn" onclick="startVentPlacement()">Vent platzieren</button>
            <button class="panel-btn" style="border-color:#ef4444" onclick="startVentRemoval()">Vent entfernen</button>
            <button class="panel-btn" style="border-color:#3b82f6" onclick="copyVentsJSON()">JSON kopieren</button>
            <button class="panel-btn" style="border-color:#10b981" onclick="closeDebugMenu()">Schließen</button>
        </div>
        <p id="debug-status-text">Hitboxen sind permanent aktiv.</p>
    </div>

    <div id="joystick-zone">

    </div>
    
    <div id="action-btn"></div>

            { "x1": 1535, "y1": 251, "x2": 1542, "y2": 215 }, { "x1": 1546, "y1": 213, "x2": 1586, "y2": 222 },
            { "x1": 1589, "y1": 220, "x2": 1586, "y2": 184 }, { "x1": 1586, "y1": 186, "x2": 1493, "y2": 104 },
            { "x1": 1497, "y1": 102, "x2": 1401, "y2": 101 }, { "x1": 1453, "y1": 110, "x2": 1451, "y2": 172 },
            { "x1": 1452, "y1": 177, "x2": 1433, "y2": 209 }, { "x1": 1431, "y1": 211, "x2": 1326, "y2": 211 }
        ];

        const pivotX = 1062;
        const pivotY = 354;
        const finalTables = [
            { cx: pivotX + (917 - pivotX) * 0.71 + 20, cy: pivotY + (218 - pivotY) * 0.77 - 110, radius: 52 * 0.77 },
            { cx: pivotX + (1208 - pivotX) * 0.71 + 20, cy: pivotY + (218 - pivotY) * 0.77 - 110, radius: 52 * 0.77 },
            { cx: pivotX + (1062 - pivotX) * 0.71 + 20, cy: pivotY + (354 - pivotY) * 0.77 - 110, radius: 52 * 0.77 },
            { cx: pivotX + (917 - pivotX) * 0.71 + 20, cy: pivotY + (491 - pivotY) * 0.77 - 110, radius: 52 * 0.77 },
            { cx: pivotX + (1208 - pivotX) * 0.71 + 20, cy: pivotY + (491 - pivotY) * 0.77 - 110, radius: 52 * 0.77 }
        ];

        const textures = {};
        const sources = {
            map: 'assets/Map.png',
            player: 'assets/IMG_0964.webp',
            useBtn: 'assets/use.webp',
            useSecBtn: 'assets/use_sec.webp',
            engBtn: 'assets/eng.webp'
        };

        let loadedImages = 0;
        const totalImages = Object.keys(sources).length;
        for (let key in sources) {
            textures[key] = new Image();
            textures[key].src = sources[key];
            textures[key].onload = () => {
                loadedImages++;
                if (loadedImages === totalImages) {
                    updateButtonTexture(false);
                    engineerBtn.style.backgroundImage = `url('${sources.engBtn}')`;
                }
            };
        }

        let player = { x: 1060, y: 260, radius: 10, width: 21, height: 27, speed: 4.5, vx: 0, vy: 0, facingRight: true };
        let camera = { x: 0, y: 0 };
        let isViewingSecurity = false;
        let nearSecurity = false;
        let nearVent = null;

        const keys = {};
        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        const actionBtn = document.getElementById('action-btn');
        const engineerBtn = document.getElementById('engineer-btn');

        let joystickActive = false;
        let joystickStartX = 0, joystickStartY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function selectRole(role) {
            playerRole = role;
            document.getElementById('role-selection-overlay').style.display = 'none';
            if (role === 'engineer') {
                engineerBtn.style.display = 'block';
            }
            gameActive = true;
        }

        function toggleDebugMenu() {
            debugMenuOpen = !debugMenuOpen;
            document.getElementById('debug-overlay').style.display = debugMenuOpen ? 'flex' : 'none';
            if (!debugMenuOpen) {
                placementActive = false;
                removalActive = false;
            }
        }

        function closeDebugMenu() {
            debugMenuOpen = false;
            document.getElementById('debug-overlay').style.display = 'none';
            placementActive = false;
            removalActive = false;
        }

        function startVentPlacement() {
            currentVentIdInput = document.getElementById('vent-id').value.trim() || "1";
            currentVentSizeInput = parseInt(document.getElementById('vent-size').value) || 25;
            placementActive = true;
            removalActive = false;
            debugMenuOpen = false;
            document.getElementById('debug-overlay').style.display = 'none';
            document.getElementById('debug-status-text').innerText = `Klicke auf die Map, um Vent ID ${currentVentIdInput} zu platzieren.`;
        }

        function startVentRemoval() {
            removalActive = true;
            placementActive = false;
            debugMenuOpen = false;
            document.getElementById('debug-overlay').style.display = 'none';
            document.getElementById('debug-status-text').innerText = "Klicke auf ein Vent auf der Map, um es zu entfernen.";
        }

        function copyVentsJSON() {
            const jsonStr = JSON.stringify(vents, null, 4);
            navigator.clipboard.writeText(jsonStr).then(() => {
                const statusText = document.getElementById('debug-status-text');
                const oldText = statusText.innerText;
                statusText.innerText = "JSON erfolgreich kopiert!";
                setTimeout(() => { statusText.innerText = oldText; }, 2000);
            }).catch(err => {
                console.error("Fehler beim Kopieren: ", err);
                alert("Kopieren fehlgeschlagen. JSON in Konsole ausgegeben.");
                console.log(jsonStr);
            });
        }

        function handleMapClick(e) {
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            if (clientX === undefined || clientY === undefined) return;

            const worldX = clientX - (canvas.width / 2 - player.x);
            const worldY = clientY - (canvas.height / 2 - player.y);

            if (placementActive) {
                vents.push({
                    id: currentVentIdInput,
                    cx: Math.round(worldX),
                    cy: Math.round(worldY),
                    radius: currentVentSizeInput
                });
                placementActive = false;
                document.getElementById('debug-status-text').innerText = `Vent ${currentVentIdInput} platziert bei (${Math.round(worldX)}, ${Math.round(worldY)}).`;
            } else if (removalActive) {
                let foundIndex = -1;
                for (let i = 0; i < vents.length; i++) {
                    const dx = worldX - vents[i].cx;
                    const dy = worldY - vents[i].cy;
                    if (Math.sqrt(dx * dx + dy * dy) <= vents[i].radius + 10) {
                        foundIndex = i;
                        break;
                    }
                }
                if (foundIndex !== -1) {
                    const removed = vents.splice(foundIndex, 1);
                    document.getElementById('debug-status-text').innerText = `Vent ${removed[0].id} erfolgreich entfernt.`;
                } else {
                    document.getElementById('debug-status-text').innerText = "Kein Vent an dieser Position gefunden.";
                }
                removalActive = false;
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            if (placementActive || removalActive) {
                handleMapClick(e);
            }
        });
        canvas.addEventListener('touchstart', (e) => {
            if (placementActive || removalActive) {
                handleMapClick(e);
            }
        }, { passive: true });

        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        joystickZone.addEventListener('touchstart', (e) => {
            if (isViewingSecurity) return;
            joystickActive = true;
            const touch = e.touches[0];
            const rect = joystickZone.getBoundingClientRect();
            joystickStartX = rect.left + rect.width / 2;
            joystickStartY = rect.top + rect.height / 2;
            handleJoystickMove(touch.clientX, touch.clientY);
        }, { passive: true });

        joystickZone.addEventListener('touchmove', (e) => {
            if (!joystickActive || isViewingSecurity) return;
            const touch = e.touches[0];
            handleJoystickMove(touch.clientX, touch.clientY);
        }, { passive: true });

        joystickZone.addEventListener('touchend', () => {
            joystickActive = false;
            player.vx = 0;
            player.vy = 0;
            joystickKnob.style.transform = `translate(0px, 0px)`;
        });

        function handleJoystickMove(clientX, clientY) {
            let dx = clientX - joystickStartX;
            let dy = clientY - joystickStartY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 40;

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;

            const angle = Math.atan2(dy, dx);
            const intensity = Math.min(distance / maxRadius, 1);
            player.vx = Math.cos(angle) * player.speed * intensity;
            player.vy = Math.sin(angle) * player.speed * intensity;

            if (player.vx > 0.2) player.facingRight = true;
            if (player.vx < -0.2) player.facingRight = false;
        }

        function updateButtonTexture(isNear) {
            if (isViewingSecurity) {
                actionBtn.style.backgroundImage = `url('${sources.useSecBtn}')`;
            } else {
                actionBtn.style.backgroundImage = `url('${sources.useBtn}')`;
            }
            actionBtn.style.opacity = isNear ? '1' : '0.4';
        }

        function checkInteractions() {
            if (isViewingSecurity) {
                nearSecurity = true;
                updateButtonTexture(true);
                return;
            }

            const sec = gameConfig.securityScreen;
            const distSec = Math.hypot(player.x - sec.cx, player.y - sec.cy);
            nearSecurity = (distSec <= sec.interactRange);

            nearVent = null;
            if (playerRole === 'engineer') {
                for (let v of vents) {
                    const distV = Math.hypot(player.x - v.cx, player.y - v.cy);
                    if (distV <= v.radius + 20) {
                        nearVent = v;
                        break;
                    }
                }
            }

            updateButtonTexture(nearSecurity);

            if (playerRole === 'engineer') {
                if (isVenting || nearVent) {
                    engineerBtn.style.opacity = '1';
                } else {
                    engineerBtn.style.opacity = '0.4';
                }
            }
        }

        function triggerAction() {
            if (nearSecurity) {
                isViewingSecurity = !isViewingSecurity;
                updateButtonTexture(true);
            }
        }

        function triggerVent() {
            if (playerRole !== 'engineer') return;

            if (isVenting) {
                isVenting = false;
                player.x = currentVentNode.cx;
                player.y = currentVentNode.cy + 15;
                currentVentNode = null;
                activeVentButtons = [];
            } else if (nearVent) {
                isVenting = true;
                currentVentNode = nearVent;
                player.vx = 0;
                player.vy = 0;
                setupVentNavigation();
            }
        }

        function setupVentNavigation() {
            activeVentButtons = [];
            vents.forEach(v => {
                if (v !== currentVentNode && v.id === currentVentNode.id) {
                    activeVentButtons.push(v);
                }
            });
        }

        function navigateToVent(targetVent) {
            if (!isVenting) return;
            currentVentNode = targetVent;
            setupVentNavigation();
        }

        function handleVentTouch(clientX, clientY) {
            const camX = canvas.width / 2 - currentVentNode.cx;
            const camY = canvas.height / 2 - currentVentNode.cy;

            for (let v of activeVentButtons) {
                const screenX = v.cx + camX;
                const screenY = v.cy + camY;
                if (Math.hypot(clientX - screenX, clientY - screenY) <= 25) {
                    navigateToVent(v);
                    break;
                }
            }
        }

        actionBtn.addEventListener('touchstart', (e) => { e.stopPropagation(); triggerAction(); }, { passive: false });
        actionBtn.addEventListener('mousedown', (e) => { e.stopPropagation(); triggerAction(); });
        engineerBtn.addEventListener('touchstart', (e) => { e.stopPropagation(); triggerVent(); }, { passive: false });
        engineerBtn.addEventListener('mousedown', (e) => { e.stopPropagation(); triggerVent(); });

        window.addEventListener('touchstart', (e) => {
            if (isVenting && currentVentNode) {
                const touch = e.touches[0];
                handleVentTouch(touch.clientX, touch.clientY);
            }
        }, { passive: true });

        window.addEventListener('mousedown', (e) => {
            if (isVenting && currentVentNode) {
                handleVentTouch(e.clientX, e.clientY);
            }
        });

        function checkWallCollision(newX, newY) {
            const r = player.radius;
            
            for (let line of wallLines) {
                let x1 = line.x1, y1 = line.y1, x2 = line.x2, y2 = line.y2;
                let A = newX - x1, B = newY - y1, C = x2 - x1, D = y2 - y1;
                let dot = A * C + B * D;
                let lenSq = C * C + D * D;
                let param = -1;
                if (lenSq !== 0) param = dot / lenSq;

                let xx, yy;
                if (param < 0) { xx = x1; yy = y1; }
                else if (param > 1) { xx = x2; yy = y2; }
                else { xx = x1 + param * C; yy = y1 + param * D; }

                let dx = newX - xx, dy = newY - yy;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < r + wallThickness / 2) return true;
            }

            for (let table of finalTables) {
                if (Math.hypot(newX - table.cx, newY - table.cy) < r + table.radius) return true;
            }

            return false;
        }

        function updatePlayerPosition() {
            if (!joystickActive && gameActive && !isViewingSecurity) {
                player.vx = 0;
                player.vy = 0;
                if (keys['KeyW'] || keys['ArrowUp']) player.vy = -player.speed;
                if (keys['KeyS'] || keys['ArrowDown']) player.vy = player.speed;
                if (keys['KeyA'] || keys['ArrowLeft']) { player.vx = -player.speed; player.facingRight = false; }
                if (keys['KeyD'] || keys['ArrowRight']) { player.vx = player.speed; player.facingRight = true; }
            }

            if ((player.vx !== 0 || player.vy !== 0) && !isViewingSecurity) {
                let nextX = player.x + player.vx;
                let nextY = player.y + player.vy;

                if (!checkWallCollision(nextX, player.y)) player.x = nextX;
                if (!checkWallCollision(player.x, nextY)) player.y = nextY;

                player.x = Math.max(player.radius, Math.min(mapWidth - player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(mapHeight - player.radius, player.y));
            }
        }

        function isPointInVision(px, py, cam) {
            let dx = px - cam.x;
            let dy = py - cam.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > cam.range) return false;
            let angleToPoint = Math.atan2(dy, dx);
            let diff = angleToPoint - cam.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            return Math.abs(diff) <= cam.fov / 2;
        }

        function drawCameraVisionSquare(cam) {
            ctx.fillStyle = 'rgba(59, 130, 246, 0.12)';
            ctx.beginPath();
            ctx.moveTo(cam.x, cam.y);
            let startAngle = cam.angle - cam.fov / 2;
            let endAngle = cam.angle + cam.fov / 2;
            ctx.arc(cam.x, cam.y, cam.range, startAngle, endAngle);
            ctx.closePath();
            ctx.fill();
            
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        function drawSecurityView() {
            ctx.fillStyle = '#111116';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const gridW = canvas.width / 2;
            const gridH = canvas.height / 2;
            const padd = 4;

            gameConfig.cameras.forEach((cam, index) => {
                let col = index % 2;
                let row = Math.floor(index / 2);
                let w = gridW - padd * 2;
                let h = gridH - padd * 2;
                let pos = { x: col * gridW + padd, y: row * gridH + padd };

                ctx.save();
                ctx.beginPath();
                ctx.rect(pos.x, pos.y, w, h);
                ctx.clip();

                ctx.fillStyle = '#1c1c24';
                ctx.fillRect(pos.x, pos.y, w, h);

                ctx.save();
                ctx.translate(pos.x + w / 2 - cam.x, pos.y + h / 2 - cam.y);

                if (textures.map && textures.map.complete) {
                    ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
                }

                drawCameraVisionSquare(cam);

                if (!isVenting && isPointInVision(player.x, player.y, cam)) {
                    ctx.save();
                    ctx.translate(player.x, player.y);
                    if (!player.facingRight) ctx.scale(-1, 1);
                    if (textures.player && textures.player.complete) {
                        ctx.drawImage(textures.player, -player.width / 2, -player.height / 2, player.width, player.height);
                    }
                    ctx.restore();
                }

                ctx.restore();

                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 3;
                ctx.strokeRect(pos.x, pos.y, w, h);

                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(pos.x + 10, pos.y + 10, 185, 30);
                ctx.fillStyle = '#00ffcc';
                ctx.font = 'bold 11px monospace';
                ctx.fillText(`CAM: ${cam.id}`, pos.x + 15, pos.y + 28);
                ctx.restore();
            });

            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(canvas.width / 2 - 150, canvas.height - 50, 300, 40);
            ctx.fillStyle = '#ef4444';
            ctx.font = 'bold 14px monospace';
            ctx.textAlign = 'center';
            ctx.fillText("LIVE SECURITY MONITOR", canvas.width / 2, canvas.height - 25);
            ctx.textAlign = 'left';
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (isViewingSecurity) {
                drawSecurityView();
                return;
            }

            let camX = canvas.width / 2 - (isVenting ? currentVentNode.cx : player.x);
            let camY = canvas.height / 2 - (isVenting ? currentVentNode.cy : player.y);

            ctx.save();
            ctx.translate(camX, camY);

            if (textures.map && textures.map.complete) {
                ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
            } else {
                ctx.fillStyle = '#222';
                ctx.fillRect(0, 0, mapWidth, mapHeight);
            }

            if (debugMode) {
                ctx.strokeStyle = 'rgba(239, 68, 68, 0.6)';
                ctx.lineWidth = 2;
                wallLines.forEach(line => {
                    ctx.beginPath();
                    ctx.moveTo(line.x1, line.y1);
                    ctx.lineTo(line.x2, line.y2);
                    ctx.stroke();
                });

                ctx.fillStyle = 'rgba(239, 68, 68, 0.2)';
                ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)';
                finalTables.forEach(t => {
                    ctx.beginPath();
                    ctx.arc(t.cx, t.cy, t.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                });

                const sec = gameConfig.securityScreen;
                ctx.fillStyle = 'rgba(59, 130, 246, 0.3)';
                ctx.beginPath();
                ctx.arc(sec.cx, sec.cy, sec.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            vents.forEach(v => {
                ctx.fillStyle = 'rgba(168, 85, 247, 0.4)';
                ctx.strokeStyle = '#a855f7';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(v.cx, v.cy, v.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#fff';
                ctx.font = '10px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`V:${v.id}`, v.cx, v.cy + 3);
                ctx.textAlign = 'left';
            });

            if (isVenting && currentVentNode) {
                activeVentButtons.forEach(v => {
                    ctx.fillStyle = 'rgba(255, 255, 0, 0.6)';
                    ctx.strokeStyle = '#ffff00';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(v.cx, v.cy, 12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.strokeStyle = '#ffff00';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 4]);
                    ctx.moveTo(currentVentNode.cx, currentVentNode.cy);
                    ctx.lineTo(v.cx, v.cy);
                    ctx.stroke();
                    ctx.setLineDash([]);
                });
            }

            if (!isVenting && gameActive) {
                ctx.save();
                ctx.translate(player.x, player.y);
                if (!player.facingRight) {
                    ctx.scale(-1, 1);
                }
                if (textures.player && textures.player.complete) {
                    ctx.drawImage(textures.player, -player.width / 2, -player.height / 2, player.width, player.height);
                } else {
                    ctx.fillStyle = '#ef4444';
                    ctx.beginPath();
                    ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            ctx.restore();
        }

        function gameLoop() {
            if (!isVenting) {
                updatePlayerPosition();
            }
            if (gameActive) {
                checkInteractions();
            }
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
