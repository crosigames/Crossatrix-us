<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Among Us Clone - Mobile Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 10;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 90px;
            height: 90px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            touch-action: none;
            z-index: 10;
            display: block;
        }
        #engineer-btn {
            position: absolute;
            bottom: 155px;
            right: 50px;
            width: 90px;
            height: 90px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            touch-action: none;
            z-index: 10;
            display: none;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        
        #role-selection-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 8, 0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .window-title {
            font-size: 24px;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-family: monospace;
        }
        .role-buttons {
            display: flex;
            gap: 15px;
            flex-direction: row;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        .panel-btn {
            background: #1e1e24;
            color: #fff;
            border: 2px solid #3b82f6;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            border-radius: 8px;
            cursor: pointer;
        }
        .panel-btn:active {
            background: #3b82f6;
            color: #000;
        }
        #btn-engineer { border-color: #a855f7; }
        #btn-engineer:active { background: #a855f7; color: #000; }
    </style>
</head>

            { cx: pivotX + (1062 - pivotX) * 0.71 + 20, cy: pivotY + (354 - pivotY) * 0.77 - 110, radius: 52 * 0.77 },
            { cx: pivotX + (917 - pivotX) * 0.71 + 20, cy: pivotY + (491 - pivotY) * 0.77 - 110, radius: 52 * 0.77 },
            { cx: pivotX + (1208 - pivotX) * 0.71 + 20, cy: pivotY + (491 - pivotY) * 0.77 - 110, radius: 52 * 0.77 }
        ];

        const textures = {};
        const sources = {
            map: 'assets/Map.png',
            player: 'assets/IMG_0964.webp',
            useBtn: 'assets/use.webp',
            useSecBtn: 'assets/use_sec.webp',
            engBtn: 'assets/eng.webp'
        };

        let loadedImages = 0;
        const totalImages = Object.keys(sources).length;
        for (let key in sources) {
            textures[key] = new Image();
            textures[key].src = sources[key];
            textures[key].onload = () => {
                loadedImages++;
                if (loadedImages === totalImages) {
                    updateButtonTexture(false);
                    engineerBtn.style.backgroundImage = `url('${sources.engBtn}')`;
                }
            };
        }

        let player = { x: 1060, y: 260, radius: 10, width: 21, height: 27, speed: 4.5, vx: 0, vy: 0, facingRight: true };
        let camera = { x: 0, y: 0 };
        let isViewingSecurity = false;
        let nearSecurity = false;

        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        const actionBtn = document.getElementById('action-btn');
        const engineerBtn = document.getElementById('engineer-btn');
        const roleOverlay = document.getElementById('role-selection-overlay');

        let joystickData = { dragging: false, startX: 0, startY: 0, moveX: 0, moveY: 0 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function selectRole(role) {
            playerRole = role;
            roleOverlay.style.display = 'none';
            gameActive = true;
            if (playerRole === 'engineer') {
                engineerBtn.style.display = 'block';
            }
        }

        joystickZone.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            const touch = e.touches[0];
            const rect = joystickZone.getBoundingClientRect();
            joystickData.dragging = true;
            joystickData.startX = rect.left + rect.width / 2;
            joystickData.startY = rect.top + rect.height / 2;
        });

        joystickZone.addEventListener('touchmove', (e) => {
            if (!joystickData.dragging) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystickData.startX;
            let dy = touch.clientY - joystickData.startY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 40;

            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }

            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            joystickData.moveX = dx / maxDist;
            joystickData.moveY = dy / maxDist;
        });

        function resetJoystick() {
            joystickData.dragging = false;
            joystickKnob.style.transform = 'translate(0px, 0px)';
            joystickData.moveX = 0;
            joystickData.moveY = 0;
        }
        joystickZone.addEventListener('touchend', resetJoystick);
        joystickZone.addEventListener('touchcancel', resetJoystick);

        actionBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (nearSecurity) {
                isViewingSecurity = !isViewingSecurity;
                updateButtonTexture(nearSecurity);
            }
        });

        engineerBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (playerRole !== 'engineer') return;
            handleEngineerAction();
        });

        function handleEngineerAction() {
            if (isVenting) {
                isVenting = false;
                player.x = currentVentNode.x;
                player.y = currentVentNode.y + 15;
                currentVentNode = null;
                engineerBtn.style.opacity = "0.4";
                return;
            }

            let closest = null;
            let minDist = 60; 
            vents.forEach(v => {
                let d = Math.getDistance(player.x, player.y, v.x, v.y);
                if (d < minDist) { closest = v; minDist = d; }
            });

            if (closest) {
                isVenting = true;
                currentVentNode = closest;
                player.x = closest.x;
                player.y = closest.y;
                engineerBtn.style.opacity = "1.0";
            }
        }

        function getVentsInSameGroup(groupId) {
            return vents.filter(v => v.id === groupId);
        }

        function createVentNavigationButtons() {
            activeVentButtons = [];
            if (!isVenting || !currentVentNode) return;
            let siblings = getVentsInSameGroup(currentVentNode.id);
            siblings.forEach(s => {
                if (s.x === currentVentNode.x && s.y === currentVentNode.y) return;
                let angle = Math.atan2(s.y - currentVentNode.y, s.x - currentVentNode.x);
                activeVentButtons.push({ angle: angle, target: s });
            });
        }

        Math.getDistance = function(x1, y1, x2, y2) {
            return Math.sqrt((x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1));
        };

        function updateButtonTexture(isActive) {
            if (isActive) {
                actionBtn.style.backgroundImage = `url('${sources.useSecBtn}')`;
                actionBtn.style.opacity = "1.0";
            } else {
                actionBtn.style.backgroundImage = `url('${sources.useBtn}')`;
                actionBtn.style.opacity = "0.4";
            }
        }

        function checkLineCircleCollision(x1, y1, x2, y2, cx, cy, r) {
            let abx = x2 - x1;
            let aby = y2 - y1;
            let acx = cx - x1;
            let acy = cy - y1;
            let ab_len_sq = abx*abx + aby*aby;
            if (ab_len_sq === 0) return Math.sqrt(acx*acx + acy*acy) < r;
            let t = (acx*abx + acy*aby) / ab_len_sq;
            t = Math.max(0, Math.min(1, t));
            let closestX = x1 + t * abx;
            let closestY = y1 + t * aby;
            let distSq = (cx - closestX)*(cx - closestX) + (cy - closestY)*(cy - closestY);
            return distSq < (r * r);
        }

        function checkCollision(cx, cy, r) {
            if (cx - r < 0 || cx + r > mapWidth || cy - r < 0 || cy + r > mapHeight) return true;
            for (let i = 0; i < wallLines.length; i++) {
                let w = wallLines[i];
                if (checkLineCircleCollision(w.x1, w.y1, w.x2, w.y2, cx, cy, r + wallThickness / 2)) {
                    return true;
                }
            }
            for (let i = 0; i < finalTables.length; i++) {
                let t = finalTables[i];
                let d = Math.getDistance(cx, cy, t.cx, t.cy);
                if (d < r + t.radius) return true;
            }
            return false;
        }

        function update() {
            if (!gameActive) return;

            if (!isVenting) {
                if (joystickData.dragging && !isViewingSecurity) {
                    let moveSpeed = player.speed;
                    let nvx = joystickData.moveX * moveSpeed;
                    let nvy = joystickData.moveY * moveSpeed;

                    if (nvx !== 0) player.facingRight = nvx > 0;

                    let steps = 5;
                    let stepX = nvx / steps;
                    let stepY = nvy / steps;

                    for (let s = 0; s < steps; s++) {
                        if (!checkCollision(player.x + stepX, player.y, player.radius)) {
                            player.x += stepX;
                        }
                        if (!checkCollision(player.x, player.y + stepY, player.radius)) {
                            player.y += stepY;
                        }
                    }
                }

                let sec = gameConfig.securityScreen;
                let dSec = Math.getDistance(player.x, player.y, sec.cx, sec.cy);
                let wasNear = nearSecurity;
                nearSecurity = (dSec < sec.interactRange);
                if (nearSecurity !== wasNear && !isViewingSecurity) {
                    updateButtonTexture(nearSecurity);
                }
                if (!nearSecurity && isViewingSecurity) {
                    isViewingSecurity = false;
                    updateButtonTexture(false);
                }

                if (playerRole === 'engineer') {
                    let canVent = false;
                    vents.forEach(v => {
                        if (Math.getDistance(player.x, player.y, v.x, v.y) < 60) canVent = true;
                    });
                    engineerBtn.style.opacity = canVent ? "1.0" : "0.4";
                }
            } else {
                createVentNavigationButtons();
                if (joystickData.dragging) {
                    let mx = joystickData.moveX;
                    let my = joystickData.moveY;
                    let angle = Math.atan2(my, mx);
                    let mag = Math.sqrt(mx*mx + my*my);
                    
                    if (mag > 0.5) {
                        let bestBtn = null;
                        let bestDiff = 0.6; 
                        activeVentButtons.forEach(b => {
                            let diff = Math.abs(b.angle - angle);
                            if (diff > Math.PI) diff = Math.PI * 2 - diff;
                            if (diff < bestDiff) { bestDiff = diff; bestBtn = b; }
                        });
                        if (bestBtn) {
                            currentVentNode = bestBtn.target;
                            player.x = currentVentNode.x;
                            player.y = currentVentNode.y;
                            resetJoystick();
                        }
                    }
                }
            }

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;

            camera.x = Math.max(0, Math.min(mapWidth - canvas.width, camera.x));
            camera.y = Math.max(0, Math.min(mapHeight - canvas.height, camera.y));
        }

        function isPointInVision(px, py, cam) {
            let d = Math.getDistance(cam.x, cam.y, px, py);
            if (d > cam.range) return false;
            let angleToPlayer = Math.atan2(py - cam.y, px - cam.x);
            let diff = Math.abs(angleToPlayer - cam.angle);
            if (diff > Math.PI) diff = Math.PI * 2 - diff;
            return diff < cam.fov / 2;
        }

        function drawCameraVisionSquare(cam) {
            ctx.fillStyle = 'rgba(239, 68, 68, 0.07)';
            ctx.beginPath();
            ctx.moveTo(cam.x, cam.y);
            ctx.arc(cam.x, cam.y, cam.range, cam.angle - cam.fov/2, cam.angle + cam.fov/2);
            ctx.closePath();
            ctx.fill();
            
            ctx.save();
            ctx.translate(cam.x, cam.y);
            ctx.rotate(cam.angle);
            ctx.fillStyle = '#ef4444';
            ctx.fillRect(-6, -6, 12, 12);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(4, -2, 4, 4);
            ctx.restore();
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!isViewingSecurity) {
                ctx.save();
                ctx.translate(-camera.x, -camera.y);

                if (textures.map && textures.map.complete) {
                    ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
                } else {
                    ctx.fillStyle = '#1c1c24';
                    ctx.fillRect(0, 0, mapWidth, mapHeight);
                }

                // Vents zeichnen
                vents.forEach(v => {
                    ctx.fillStyle = 'rgba(75, 85, 99, 0.8)';
                    ctx.strokeStyle = '#374151';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(v.x, v.y, v.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = '#111827';
                    ctx.fillRect(v.x - v.radius * 0.6, v.y - v.radius * 0.15, v.radius * 1.2, v.radius * 0.3);
                });

                if (!isVenting) {
                    ctx.save();
                    ctx.translate(player.x, player.y);
                    if (!player.facingRight) ctx.scale(-1, 1);

                    if (textures.player && textures.player.complete) {
                        ctx.drawImage(textures.player, -player.width/2, -player.height/2, player.width, player.height);
                    } else {
                        ctx.fillStyle = '#ef4444';
                        ctx.beginPath();
                        ctx.arc(0, 0, player.radius, 0, Math.PI*2);
                        ctx.fill();
                    }
                    ctx.restore();
                }

                if (isVenting && activeVentButtons.length > 0) {
                    activeVentButtons.forEach(b => {
                        let arrowX = currentVentNode.x + Math.cos(b.angle) * 55;
                        let arrowY = currentVentNode.y + Math.sin(b.angle) * 55;
                        ctx.fillStyle = '#a855f7';
                        ctx.beginPath();
                        ctx.arc(arrowX, arrowY, 12, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(arrowX - Math.cos(b.angle)*4, arrowY - Math.sin(b.angle)*4);
                        ctx.lineTo(arrowX + Math.cos(b.angle)*5, arrowY + Math.sin(b.angle)*5);
                        ctx.stroke();
                    });
                }

                ctx.restore();
            } else {
                let count = gameConfig.cameras.length;
                let cols = 2, rows = 2;
                let w = canvas.width / cols;
                let h = canvas.height / rows;

                gameConfig.cameras.forEach((cam, index) => {
                    let r = Math.floor(index / cols);
                    let c = index % cols;
                    let pos = { x: c * w, y: r * h };

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(pos.x, pos.y, w, h);
                    ctx.clip();

                    ctx.translate(pos.x + w / 2 - cam.x, pos.y + h / 2 - cam.y);
                    if (textures.map && textures.map.complete) ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
                    drawCameraVisionSquare(cam);

                    if (!isVenting && isPointInVision(player.x, player.y, cam)) {
                        ctx.save();
                        ctx.translate(player.x, player.y);
                        if (!player.facingRight) ctx.scale(-1, 1);
                        if (textures.player && textures.player.complete) {
                            ctx.drawImage(textures.player, -player.width/2, -player.height/2, player.width, player.height);
                        }
                        ctx.restore();
                    }
                    ctx.restore();

                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(pos.x, pos.y, w, h);

                    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    ctx.fillRect(pos.x + 10, pos.y + 10, 185, 30);
                    ctx.fillStyle = '#00ffcc';
                    ctx.font = 'bold 11px monospace';
                    ctx.fillText(`CAM: ${cam.id}`, pos.x + 15, pos.y + 28);
                });

                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(canvas.width / 2 - 150, canvas.height - 50, 300, 40);
                ctx.fillStyle = '#ef4444';
                ctx.font = 'bold 14px monospace';
                ctx.textAlign = 'center';
                ctx.fillText("SECURITY MONITOR - TAP ACTION TO EXIT", canvas.width / 2, canvas.height - 25);
                ctx.textAlign = 'left';
            }
        }

        function loop() {
            update();
            drawGame();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
