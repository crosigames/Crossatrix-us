<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us Clone - Gameplay</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 10;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 80px;
            height: 80px;
            background: rgba(180, 180, 180, 0.4);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>
    
    <div id="action-btn">USE</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const mapWidth = 1920;
        const mapHeight = 1080;
        const wallThickness = 15;

        // Deine exakten, gemalten Wanddaten aus dem JSON
        const wallLines = [
            { "x1": 1206, "y1": 34,  "x2": 1333, "y2": 165 },
            { "x1": 1326, "y1": 146, "x2": 1324, "y2": 215 },
            { "x1": 1198, "y1": 35,  "x2": 901,  "y2": 33  },
            { "x1": 944,  "y1": 32,  "x2": 866,  "y2": 109 },
            { "x1": 859,  "y1": 211, "x2": 860,  "y2": 86  },
            { "x1": 857,  "y1": 270, "x2": 857,  "y2": 360 },
            { "x1": 858,  "y1": 368, "x2": 957,  "y2": 471 },
            { "x1": 958,  "y1": 474, "x2": 1055, "y2": 472 },
            { "x1": 1121, "y1": 471, "x2": 1215, "y2": 471 },
            { "x1": 1329, "y1": 358, "x2": 1222, "y2": 466 },
            { "x1": 1322, "y1": 270, "x2": 1326, "y2": 361 }
        ];

        // Deine perfekten, kalibrierten Tischeinstellungen
        const tableOffsetX = 20;
        const tableOffsetY = -110;
        const tableFactorX = 0.71;
        const tableFactorY = 0.77;
        const pivotX = 1062;
        const pivotY = 354;

        const baseCircleHitboxes = [
            { cx: 917,  cy: 218, radius: 52 },
            { cx: 1208, cy: 218, radius: 52 },
            { cx: 1062, cy: 354, radius: 52 },
            { cx: 917,  cy: 491, radius: 52 },
            { cx: 1208, cy: 491, radius: 52 }
        ];

        // Berechne die transformierten Kreis-Hitboxen vorab
        const finalTables = baseCircleHitboxes.map(circle => {
            let rcx = pivotX + (circle.cx - pivotX) * tableFactorX + tableOffsetX;
            let rcy = pivotY + (circle.cy - pivotY) * tableFactorY + tableOffsetY;
            let rRad = circle.radius * Math.max(tableFactorX, tableFactorY);
            return { cx: rcx, cy: rcy, radius: rRad };
        });

        // Texturen-Setup
        const textures = {};
        const sources = {
            map: 'assets/Map.png',
            player: 'assets/IMG_0964.webp'
        };
        
        for (let key in sources) {
            textures[key] = new Image();
            textures[key].src = sources[key];
        }

        // Spieler-Setup (Behandlung als Kreis für Vektor-Kollisionen)
        let player = {
            x: 1060, // Start im Zentrum der Cafeteria
            y: 260,  
            radius: 20, 
            width: 42,   // Render-Breite
            height: 54,  // Render-Höhe
            speed: 5,
            vx: 0,
            vy: 0,
            facingRight: true
        };

        let camera = { x: 0, y: 0 };
        const keys = {};

        // UI Touch-Handling
        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickStartX = 0, joystickStartY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        joystickZone.addEventListener('touchstart', e => {
            joystickActive = true;
            const rect = joystickZone.getBoundingClientRect();
            joystickStartX = rect.left + rect.width / 2;
            joystickStartY = rect.top + rect.height / 2;
        });

        window.addEventListener('touchmove', e => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystickStartX;
            let dy = touch.clientY - joystickStartY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 40;

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            player.vx = (dx / maxRadius) * player.speed;
            player.vy = (dy / maxRadius) * player.speed;
        });

        window.addEventListener('touchend', () => {
            joystickActive = false;
            joystickKnob.style.transform = 'translate(0px, 0px)';
            player.vx = 0;
            player.vy = 0;
        });

        // Mathematische Auflösung für Liniensegment-Kollision (Vektorbasiert)
        function resolveLineCollision(p, line) {
            let dx = line.x2 - line.x1;
            let dy = line.y2 - line.y1;
            let lenSq = dx * dx + dy * dy;
            if (lenSq === 0) return;

            // Projektion des Spieler-Mittelpunkts auf die unendliche Gerade
            let t = ((p.x - line.x1) * dx + (p.y - line.y1) * dy) / lenSq;
            // Begrenzung auf das reale Liniensegment zwischen Start- und Endpunkt
            t = Math.max(0, Math.min(1, t));

            // Kürzester Punkt auf dem Segment zum Spieler
            let closestX = line.x1 + t * dx;
            let closestY = line.y1 + t * dy;

            let distVecX = p.x - closestX;
            let distVecY = p.y - closestY;
            let distance = Math.sqrt(distVecX * distVecX + distVecY * distVecY);

            // Erlaubter Minimalabstand (Spielerradius + halbe Wandstärke)
            let minDist = p.radius + (wallThickness / 2);

            if (distance < minDist) {
                if (distance === 0) return;
                let overlap = minDist - distance;
                // Schiebe Spieler entlang des Abstandsvektors heraus
                p.x += (distVecX / distance) * overlap;
                p.y += (distVecY / distance) * overlap;
            }
        }

        // Kreis-Kollision für die Tische
        function resolveCircleCollision(p, circle) {
            let dx = p.x - circle.cx;
            let dy = p.y - circle.cy;
            let distance = Math.sqrt(dx * dx + dy * dy);
            let minDist = p.radius + circle.radius;

            if (distance < minDist) {
                if (distance === 0) return;
                let overlap = minDist - distance;
                p.x += (dx / distance) * overlap;
                p.y += (dy / distance) * overlap;
            }
        }

        function update() {
            if (keys['w'] || keys['arrowup']) player.vy = -player.speed;
            else if (keys['s'] || keys['arrowdown']) player.vy = player.speed;
            else if (!joystickActive) player.vy = 0;

            if (keys['a'] || keys['arrowleft']) { player.vx = -player.speed; player.facingRight = false; }
            else if (keys['d'] || keys['arrowright']) { player.vx = player.speed; player.facingRight = true; }
            else if (!joystickActive) player.vx = 0;

            if (joystickActive && player.vx !== 0) {
                player.facingRight = player.vx > 0;
            }

            // Bewegung anwenden
            player.x += player.vx;
            player.y += player.vy;

            // Kollisionsabfragen gegen alle Linienwände laufen lassen
            for (let line of wallLines) {
                resolveLineCollision(player, line);
            }

            // Kollisionsabfragen gegen Tische laufen lassen
            for (let table of finalTables) {
                resolveCircleCollision(player, table);
            }

            // Map-Begrenzung absolut
            if (player.x < 0) player.x = 0;
            if (player.y < 0) player.y = 0;
            if (player.x > mapWidth) player.x = mapWidth;
            if (player.y > mapHeight) player.y = mapHeight;

            // Kamera-Fokus weich auf Spieler zentrieren
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;

            if (camera.x < 0) camera.x = 0;
            if (camera.y < 0) camera.y = 0;
            if (camera.x > mapWidth - canvas.width) camera.x = Math.max(0, mapWidth - canvas.width);
            if (camera.y > mapHeight - canvas.height) camera.y = Math.max(0, mapHeight - canvas.height);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Hintergrund-Map
            if (textures.map && textures.map.complete && textures.map.naturalWidth !== 0) {
                ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
            } else {
                ctx.fillStyle = '#1e1e24';
                ctx.fillRect(0, 0, mapWidth, mapHeight);
            }

            // DEBUG RENDERING: Um die Hitboxen zu deaktivieren, einfach die folgenden Zeilen auskommentieren:
            
            // Wände (Rot)
            ctx.strokeStyle = 'rgba(255, 0, 50, 0.4)';
            ctx.lineWidth = wallThickness;
            ctx.lineCap = 'round';
            for (let line of wallLines) {
                ctx.beginPath();
                ctx.moveTo(line.x1, line.y1);
                ctx.lineTo(line.x2, line.y2);
                ctx.stroke();
            }

            // Tische (Blau)
            ctx.fillStyle = 'rgba(0, 100, 255, 0.35)';
            for (let table of finalTables) {
                ctx.beginPath();
                ctx.arc(table.cx, table.cy, table.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            // Spieler rendern
            ctx.save();
            // Zeichne Textur zentriert über die mathematische Kreisposition
            ctx.translate(player.x, player.y);
            if (!player.facingRight) ctx.scale(-1, 1);

            if (textures.player && textures.player.complete && textures.player.naturalWidth !== 0) {
                ctx.drawImage(textures.player, -player.width / 2, -player.height / 2, player.width, player.height);
            } else {
                ctx.fillStyle = '#da2222';
                ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
            }
            ctx.restore();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
