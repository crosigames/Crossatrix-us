<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us Clone</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            z-index: 10;
        }
        #joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 80px;
            height: 80px;
            background: rgba(180, 180, 180, 0.4);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>
    
    <div id="action-btn">USE</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Native Dimensionen des Hintergrundbildes (1920x1080)
        const mapWidth = 1920;
        const mapHeight = 1080;

        const textures = {};
        const sources = {
            map: 'assets/Map.png',
            player: 'assets/IMG_0964.webp'
        };
        
        let loadedCount = 0;
        const totalSources = Object.keys(sources).length;

        for (let key in sources) {
            textures[key] = new Image();
            textures[key].src = sources[key];
            textures[key].onload = () => { loadedCount++; };
            textures[key].onerror = () => { loadedCount++; };
        }

        // ==========================================
        // EXAKT REALIOSIERTE UND JUSTIERTE HITBOXEN
        // ==========================================
        const hitboxes = [
            // Außenwände der Gesamtkarte
            { x: 0, y: 0, width: 1920, height: 40 },
            { x: 0, y: 1040, width: 1920, height: 40 },
            { x: 0, y: 0, width: 40, height: 1080 },
            { x: 1880, y: 0, width: 40, height: 1080 },

            // Cafeteria Wände (Exakt an die Raumgrenzen der Map angepasst)
            { x: 810,  y: 40,  width: 45,  height: 520 },  // Linke Wand (MedBay-Seite)
            { x: 1470, y: 40,  width: 45,  height: 520 },  // Rechte Wand (Weapons-Seite)
            { x: 810,  y: 40,  width: 700, height: 50 },   // Obere Wand
            { x: 810,  y: 560, width: 235, height: 45 },   // Untere Wand Links vom Ausgang
            { x: 1235, y: 560, width: 280, height: 45 },   // Untere Wand Rechts vom Ausgang
            
            // Flurbegrenzungen Süden
            { x: 1045, y: 605, width: 40,  height: 300 },  // Flur Wand links
            { x: 1235, y: 605, width: 40,  height: 300 }   // Flur Wand rechts
        ];

        // Die 5 Tische exakt über den blauen Texturen platziert
        const circleHitboxes = [
            { cx: 960,  cy: 215, radius: 62 }, // Oben Links
            { cx: 1320, cy: 215, radius: 62 }, // Oben Rechts
            { cx: 1140, cy: 370, radius: 65 }, // Mitte (Emergency-Tisch)
            { cx: 960,  cy: 515, radius: 62 }, // Unten Links
            { cx: 1320, cy: 515, radius: 62 }  // Unten Rechts
        ];

        // Spieler-Setup: Startet direkt unterhalb des Emergency-Tisches im freien Raum
        let player = {
            x: 1115, 
            y: 470,  
            width: 50,  
            height: 65, 
            speed: 5.5,
            vx: 0,
            vy: 0,
            facingRight: true
        };

        let camera = { x: 0, y: 0 };
        const keys = {};

        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickStartX = 0;
        let joystickStartY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        joystickZone.addEventListener('touchstart', e => {
            joystickActive = true;
            const rect = joystickZone.getBoundingClientRect();
            joystickStartX = rect.left + rect.width / 2;
            joystickStartY = rect.top + rect.height / 2;
        });

        window.addEventListener('touchmove', e => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            let dx = touch.clientX - joystickStartX;
            let dy = touch.clientY - joystickStartY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 40;

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            player.vx = (dx / maxRadius) * player.speed;
            player.vy = (dy / maxRadius) * player.speed;
        });

        window.addEventListener('touchend', () => {
            joystickActive = false;
            joystickKnob.style.transform = 'translate(0px, 0px)';
            player.vx = 0;
            player.vy = 0;
        });

        function checkRectCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function resolveCircleCollision(playerObj, circle) {
            let closestX = Math.max(playerObj.x, Math.min(circle.cx, playerObj.x + playerObj.width));
            let closestY = Math.max(playerObj.y, Math.min(circle.cy, playerObj.y + playerObj.height));

            let distanceX = circle.cx - closestX;
            let distanceY = circle.cy - closestY;
            let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

            if (distanceSquared < circle.radius * circle.radius) {
                let distance = Math.sqrt(distanceSquared);
                if (distance === 0) return;

                let overlap = circle.radius - distance;
                let dirX = distanceX / distance;
                let dirY = distanceY / distance;

                playerObj.x -= dirX * overlap;
                playerObj.y -= dirY * overlap;
            }
        }

        function update() {
            if (keys['w'] || keys['arrowup']) player.vy = -player.speed;
            else if (keys['s'] || keys['arrowdown']) player.vy = player.speed;
            else if (!joystickActive) player.vy = 0;

            if (keys['a'] || keys['arrowleft']) { player.vx = -player.speed; player.facingRight = false; }
            else if (keys['d'] || keys['arrowright']) { player.vx = player.speed; player.facingRight = true; }
            else if (!joystickActive) player.vx = 0;

            if (joystickActive && player.vx !== 0) {
                player.facingRight = player.vx > 0;
            }

            // Move & Collide X
            player.x += player.vx;
            for (let box of hitboxes) {
                if (checkRectCollision(player, box)) {
                    if (player.vx > 0) player.x = box.x - player.width;
                    if (player.vx < 0) player.x = box.x + box.width;
                }
            }

            // Move & Collide Y
            player.y += player.vy;
            for (let box of hitboxes) {
                if (checkRectCollision(player, box)) {
                    if (player.vy > 0) player.y = box.y - player.height;
                    if (player.vy < 0) player.y = box.y + box.height;
                }
            }

            // Tische abstoßen
            for (let circle of circleHitboxes) {
                resolveCircleCollision(player, circle);
            }

            // Dynamischer Kamerafokus auf die Mitte des Spielers
            camera.x = player.x + player.width / 2 - canvas.width / 2;
            camera.y = player.y + player.height / 2 - canvas.height / 2;

            // Kamera sauber am Map-Rand blockieren
            if (camera.x < 0) camera.x = 0;
            if (camera.y < 0) camera.y = 0;
            if (camera.x > mapWidth - canvas.width) camera.x = Math.max(0, mapWidth - canvas.width);
            if (camera.y > mapHeight - canvas.height) camera.y = Math.max(0, mapHeight - canvas.height);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // Rendere Map
            if (textures.map && textures.map.complete && textures.map.naturalWidth !== 0) {
                ctx.drawImage(textures.map, 0, 0, mapWidth, mapHeight);
            } else {
                ctx.fillStyle = '#1e1e24';
                ctx.fillRect(0, 0, mapWidth, mapHeight);
            }

            // Rote Debug-Overlays zur Visualisierung
            ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
            for (let box of hitboxes) {
                ctx.fillRect(box.x, box.y, box.width, box.height);
            }
            for (let circle of circleHitboxes) {
                ctx.beginPath();
                ctx.arc(circle.cx, circle.cy, circle.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            // Rendere Spieler
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
            if (!player.facingRight) ctx.scale(-1, 1);

            if (textures.player && textures.player.complete && textures.player.naturalWidth !== 0) {
                ctx.drawImage(textures.player, -player.width / 2, -player.height / 2, player.width, player.height);
            } else {
                ctx.fillStyle = '#da2222';
                ctx.fillRect(-player.width / 2, -player.height / 2, player.width, player.height);
            }
            ctx.restore();

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
